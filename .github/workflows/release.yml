name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Test, pack, and publish
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hangfire_opstoolkit
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Derive package version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore Hangfire.OpsToolkit.sln

      - name: Build
        run: dotnet build Hangfire.OpsToolkit.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Hangfire.OpsToolkit.sln --configuration Release --no-build

      - name: Pack
        run: >-
          dotnet pack src/Hangfire.OpsToolkit.JobControl/Hangfire.OpsToolkit.JobControl.csproj
          --configuration Release
          --output nupkg
          -p:Version=${{ steps.version.outputs.version }}

      - name: Test packed package
        shell: bash
        run: |
          dotnet clean tests/Hangfire.OpsToolkit.Host.IntegrationTests/Hangfire.OpsToolkit.Host.IntegrationTests.csproj \
            --configuration Release
          dotnet new nugetconfig \
            --output "$GITHUB_WORKSPACE/nupkg/package-smoke-config" \
            --force
          dotnet nuget add source "$GITHUB_WORKSPACE/nupkg" \
            --name package-smoke \
            --configfile "$GITHUB_WORKSPACE/nupkg/package-smoke-config/NuGet.Config"
          dotnet restore tests/Hangfire.OpsToolkit.Host.IntegrationTests/Hangfire.OpsToolkit.Host.IntegrationTests.csproj \
            -p:UsePackedJobControl=true \
            -p:JobControlPackageVersion=${{ steps.version.outputs.version }} \
            --packages "$GITHUB_WORKSPACE/nupkg/.package-smoke" \
            --no-cache \
            --configfile "$GITHUB_WORKSPACE/nupkg/package-smoke-config/NuGet.Config"
          dotnet test tests/Hangfire.OpsToolkit.Host.IntegrationTests/Hangfire.OpsToolkit.Host.IntegrationTests.csproj \
            --configuration Release \
            --no-restore \
            -p:UsePackedJobControl=true \
            -p:JobControlPackageVersion=${{ steps.version.outputs.version }}

      # Exchange GitHub's OIDC identity for a short-lived nuget.org API key. The trusted-publishing
      # policy is restricted to this repository and this release.yml workflow.
      - name: Authenticate to NuGet
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: xiaoguo.ge

      - name: Publish package
        run: >-
          dotnet nuget push "nupkg/*.nupkg"
          --source https://www.nuget.org/api/v2/package
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
