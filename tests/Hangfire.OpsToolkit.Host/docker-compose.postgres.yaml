services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hangfire_opstoolkit
    ports:
      - "5434:5432"
    volumes:
      - hangfire-opstoolkit-pgdata:/var/lib/postgresql/data

volumes:
  hangfire-opstoolkit-pgdata:
