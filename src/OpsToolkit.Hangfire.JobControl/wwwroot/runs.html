<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hangfire Job Control — Job Runs</title>
<style>
  /* Same design tokens as recurring.html — kept in sync deliberately (see the csproj comment: each
     bundled page is a single self-contained embedded HTML file, no shared stylesheet, no build step). */
  :root {
    --navy: #002a61; --navy-hover: #05244d;
    --secondary-blue: #3c66ff; --secondary-blue-hover: #0b36d2;
    --positive-bg: #e9fcd4; --positive-text: #315e00;
    --warning-bg: #fff0d9; --warning-border: #e4b774; --warning-text: #623b02;
    --danger-bg: #fae4e4; --danger-border: #eeafaf; --danger-text: #9e0202;
    --info-bg: #cfe0f7; --info-text: #0045a5;
    --surface: #f1f2f4; --hairline: #dbdde1; --disabled-fg: #babec5;
    --text-tertiary: #5d656f; --text-secondary: #2e3238; --text-primary: #0c0d0e;
    --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
    --shadow-card: 0 1px 2px rgba(12,13,14,0.07), 0 1px 1px rgba(12,13,14,0.04);
    --shadow-dropdown: 0 8px 24px rgba(12,13,14,0.16);
    --shadow-dialog: 0 20px 56px rgba(12,13,14,0.24);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--surface); color: var(--text-primary);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased;
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 999px; border: 3px solid transparent; background-clip: padding-box; }
  button, select { font-family: inherit; cursor: pointer; }
  code { font-family: var(--mono); }
  @keyframes drwr { from { transform: translateX(24px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes toastin { from { transform: translate(-50%, 12px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
  @keyframes pop { from { transform: scale(0.97); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  header.topbar {
    position: sticky; top: 0; z-index: 20; background: #fff; border-bottom: 1px solid var(--hairline);
    height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px;
  }
  header.topbar h1 { font-weight: 300; font-size: 17px; letter-spacing: -0.01em; margin: 0; }
  .dash-nav { display: flex; gap: 4px; }
  .dash-nav a {
    display: inline-flex; align-items: center; height: 32px; padding: 0 14px; border-radius: 999px;
    font-size: 13px; font-weight: 600; color: var(--text-tertiary); text-decoration: none;
  }
  .dash-nav a:hover { background: var(--surface); color: var(--text-primary); }
  .dash-nav a.active { background: var(--navy); color: #fff; }

  main { max-width: 1200px; margin: 0 auto; padding: 32px 24px 96px; }

  .page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; margin-bottom: 20px; }
  .page-head h2 { font-weight: 300; font-size: 30px; line-height: 1.2; letter-spacing: -0.03em; margin: 0; }
  .btn-outline-navy { display: inline-flex; align-items: center; gap: 8px; height: 40px; padding: 0 18px; border: none; box-shadow: inset 0 0 0 1.5px var(--navy); background: transparent; color: var(--navy); border-radius: 999px; font-weight: 600; font-size: 14px; }
  .btn-outline-navy:hover { background: rgba(0,42,97,0.06); }

  .state-tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--hairline); flex-wrap: wrap; }
  .state-tab-btn { padding: 10px 16px; border: none; background: transparent; border-bottom: 2px solid transparent; color: var(--text-tertiary); font-weight: 600; font-size: 13.5px; margin-bottom: -1px; display: flex; align-items: center; gap: 7px; }
  .state-tab-btn.active { border-bottom-color: var(--navy); color: var(--navy); }
  .state-tab-btn .badge { font-size: 11px; padding: 1px 7px; border-radius: 999px; background: var(--surface); color: var(--text-tertiary); }
  .state-tab-btn.active .badge { background: rgba(0,42,97,0.1); color: var(--navy); }

  .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
  .queue-picker { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); }
  .queue-picker select { height: 34px; padding: 0 10px; border: 1px solid var(--hairline); border-radius: 8px; background: #fff; font-size: 13px; color: var(--text-primary); }

  .table-card { background: #fff; border: 1px solid var(--hairline); border-radius: 14px; box-shadow: var(--shadow-card); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 13px 18px; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-tertiary); font-weight: 600; border-bottom: 1px solid var(--hairline); white-space: nowrap; }
  td { padding: 14px 18px; vertical-align: middle; border-bottom: 1px solid var(--hairline); }
  tbody tr[data-action="open-detail"] { cursor: pointer; transition: background-color 0.15s ease-out; }
  tbody tr[data-action="open-detail"]:hover { background: var(--surface); }
  tbody tr:last-child td { border-bottom: none; }
  .job-cell .job-id { font-size: 13.5px; font-weight: 600; }
  .job-cell .job-method { font-family: var(--mono); font-size: 11.5px; color: var(--text-tertiary); margin-top: 2px; }
  .cell-abs { font-size: 11.5px; color: var(--text-tertiary); margin-top: 2px; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 11px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .pill-positive { background: var(--positive-bg); color: var(--positive-text); }
  .pill-warning { background: var(--warning-bg); color: var(--warning-text); }
  .pill-danger { background: var(--danger-bg); color: var(--danger-text); }
  .pill-info { background: var(--info-bg); color: var(--info-text); }
  .pill-neutral { background: var(--surface); color: var(--text-secondary); }
  .exc-type { font-family: var(--mono); font-size: 12px; color: var(--danger-text); }
  .exc-message { font-size: 12.5px; color: var(--text-tertiary); margin-top: 2px; max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .beat-bar-track { width: 130px; height: 4px; border-radius: 999px; background: var(--surface); box-shadow: inset 0 0 0 1px var(--hairline); overflow: hidden; }
  .beat-bar-fill { height: 100%; border-radius: 999px; background: var(--secondary-blue); }
  .beat-message { font-size: 12px; color: var(--text-secondary); margin-top: 4px; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .beat-meta { font-size: 11.5px; color: var(--text-tertiary); margin-top: 3px; }
  .beat-overdue { color: var(--warning-text); font-weight: 600; }
  .empty-state { padding: 56px 24px; text-align: center; color: var(--text-tertiary); font-size: 14px; }
  .load-more-row td { text-align: center; padding: 16px; }
  .btn-ghost-ring { height: 32px; padding: 0 14px; border: none; box-shadow: inset 0 0 0 1.5px var(--hairline); background: transparent; color: var(--text-secondary); border-radius: 999px; font-weight: 600; font-size: 13px; }
  .btn-ghost-ring:hover { box-shadow: inset 0 0 0 1.5px var(--navy); color: var(--navy); }
  .btn-ghost-ring:disabled { box-shadow: inset 0 0 0 1.5px var(--hairline); color: var(--disabled-fg); cursor: not-allowed; }
  .btn-ghost-ring:disabled:hover { box-shadow: inset 0 0 0 1.5px var(--hairline); color: var(--disabled-fg); }
  #load-error { color: var(--danger-text); font-size: 13px; margin-bottom: 12px; }
  .footnote { font-size: 12px; color: var(--text-tertiary); margin-top: 16px; line-height: 1.6; max-width: 760px; }

  .actions-cell { white-space: nowrap; text-align: right; }
  .actions-cell button + button { margin-left: 6px; }
  .pill-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }
  .drawer-action-row { display: flex; gap: 10px; margin: 6px 0 22px; }
  .cancel-panel { border: 1px solid var(--hairline); border-radius: 10px; padding: 13px 15px; margin: 26px 0; }
  .cancel-panel-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .cancel-panel-reason { font-size: 12.5px; color: var(--text-secondary); margin-top: 8px; line-height: 1.5; }
  .cancel-panel-meta { font-size: 11.5px; color: var(--text-tertiary); margin-top: 4px; }
  .cancel-panel-status { font-size: 12.5px; font-weight: 600; margin-top: 10px; }

  .modal-scrim { position: fixed; inset: 0; z-index: 60; background: rgba(12,13,14,0.32); display: flex; align-items: center; justify-content: center; padding: 24px; animation: fade 0.15s ease-out; }
  .modal-box { width: min(460px, 100%); background: #fff; border-radius: 16px; box-shadow: var(--shadow-dialog); padding: 26px; animation: pop 0.16s ease-out; }
  .modal-head { display: flex; gap: 14px; align-items: flex-start; }
  .modal-icon { width: 42px; height: 42px; border-radius: 999px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .modal-title { font-weight: 300; font-size: 21px; letter-spacing: -0.02em; margin: 0; }
  .modal-body-text { font-size: 13.5px; color: var(--text-secondary); line-height: 1.55; margin: 8px 0 0; }
  .modal-body-text b { color: var(--text-primary); }
  .reason-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
  textarea.reason-input { width: 100%; padding: 11px 13px; border: 1px solid var(--hairline); border-radius: 8px; font: inherit; font-size: 14px; color: var(--text-primary); outline: none; resize: vertical; line-height: 1.5; }
  textarea.reason-input:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(0,42,97,0.12); }
  .modal-error { color: var(--danger-text); font-size: 12.5px; margin-top: 10px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
  .btn-text { height: 42px; padding: 0 20px; border: none; background: transparent; color: var(--text-secondary); border-radius: 999px; font-weight: 600; font-size: 14px; }
  .btn-text:hover { background: var(--surface); }
  .btn-danger-fill { height: 42px; padding: 0 22px; border: none; background: var(--danger-text); color: #fff; border-radius: 999px; font-weight: 600; font-size: 14px; }
  .btn-danger-fill:hover { background: #7a0101; }
  .btn-danger-fill:disabled { background: var(--hairline); color: var(--disabled-fg); cursor: not-allowed; }
  .btn-navy-fill { height: 42px; padding: 0 22px; border: none; background: var(--navy); color: #fff; border-radius: 999px; font-weight: 600; font-size: 14px; }
  .btn-navy-fill:hover { background: var(--navy-hover); }
  .btn-navy-fill:disabled { background: var(--hairline); color: var(--disabled-fg); cursor: not-allowed; }

  .scrim { position: fixed; inset: 0; z-index: 50; background: rgba(12,13,14,0.28); animation: fade 0.18s ease-out; }
  .drawer { position: fixed; top: 0; right: 0; bottom: 0; z-index: 51; width: min(560px, 100vw); background: #fff; box-shadow: var(--shadow-dialog); display: flex; flex-direction: column; animation: drwr 0.22s ease-out; }
  .drawer-head { padding: 22px 26px 18px; border-bottom: 1px solid var(--hairline); }
  .drawer-title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
  .drawer-title { font-weight: 300; font-size: 20px; letter-spacing: -0.02em; margin: 0; word-break: break-all; }
  .drawer-method { font-family: var(--mono); font-size: 12px; color: var(--text-tertiary); margin-top: 6px; }
  .drawer-close { width: 36px; height: 36px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; border: none; background: var(--surface); border-radius: 999px; color: var(--text-secondary); }
  .drawer-close:hover { background: var(--hairline); }
  .drawer-body { flex: 1; overflow-y: auto; padding: 22px 26px 32px; }
  dl.def-list { margin: 0 0 8px; display: grid; grid-template-columns: 132px 1fr; }
  dl.def-list > div { grid-column: 1 / -1; display: grid; grid-template-columns: subgrid; padding: 11px 0; border-bottom: 1px solid var(--surface); }
  dl.def-list > div:last-child { border-bottom: none; }
  dl.def-list dt { font-size: 13px; color: var(--text-tertiary); }
  dl.def-list dd { margin: 0; font-size: 13.5px; word-break: break-word; font-family: var(--mono); }
  .drawer-section-title { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 13.5px; color: var(--text-secondary); margin: 26px 0 12px; }
  .history-item { border: 1px solid var(--hairline); border-radius: 10px; padding: 11px 13px; margin-bottom: 8px; }
  .history-item-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .history-reason { font-size: 12.5px; color: var(--text-secondary); margin-top: 6px; line-height: 1.5; }
  .history-data { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .history-data-chip { font-size: 11px; font-family: var(--mono); background: var(--surface); padding: 2px 8px; border-radius: 6px; color: var(--text-secondary); }

  .toast { position: fixed; bottom: 24px; left: 50%; z-index: 70; display: flex; align-items: center; gap: 11px; background: #0c0d0e; color: #fff; padding: 13px 20px; border-radius: 999px; box-shadow: var(--shadow-dialog); font-size: 13.5px; font-weight: 500; animation: toastin 0.2s ease-out; max-width: 90vw; }

  @keyframes shimmer { from { background-position: 100% 0; } to { background-position: -100% 0; } }
  .skel { display: block; height: 12px; border-radius: 6px; background: linear-gradient(90deg, var(--surface) 25%, #e6e8eb 37%, var(--surface) 63%); background-size: 200% 100%; animation: shimmer 1.3s linear infinite; }
  button:focus-visible, a:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible { outline: 2px solid rgba(0,42,97,0.5); outline-offset: 2px; }
  .state-tab-btn .badge.badge-danger { background: var(--danger-bg); color: var(--danger-text); }
  .showing-note { font-size: 11.5px; color: var(--text-tertiary); margin-top: 8px; }
  .copy-id-btn { width: 28px; height: 28px; padding: 0; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; border: none; background: transparent; border-radius: 8px; color: var(--text-tertiary); vertical-align: middle; }
  .copy-id-btn:hover { background: var(--surface); color: var(--text-primary); }
  /* Re-renders recreate the scrim/drawer/modal DOM — .settled stops their entrance animations
     replaying on every render after the first (the source of the drawer-open flicker). */
  .scrim.settled, .drawer.settled, .modal-scrim.settled, .modal-scrim.settled .modal-box { animation: none; }
  .lookup-box { display: flex; align-items: center; height: 36px; padding: 0 13px; gap: 8px; background: #fff; border: 1px solid var(--hairline); border-radius: 999px; min-width: 220px; }
  .lookup-box:focus-within { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(0,42,97,0.12); }
  .lookup-box svg { color: var(--text-tertiary); }
  .lookup-box input { flex: 1; border: none; outline: none; background: transparent; font: inherit; font-size: 13px; color: var(--text-primary); min-width: 0; }
  @media (max-width: 920px) {
    .table-card { overflow-x: auto; }
    .table-card table { min-width: 880px; }
    main { padding: 24px 16px 96px; }
  }
</style>
</head>
<body>
<header class="topbar">
  <h1>Job control</h1>
  <nav class="dash-nav">
    <a href="{{RECURRING_UI_PATH}}">Recurring</a>
    <a class="active" href="{{OWN_UI_PATH}}">Runs</a>
  </nav>
</header>
<main><div id="app"></div></main>

<script>
(function () {
  // Replaced server-side by MapJobRunsUi — see OpsToolkit.Hangfire.JobControl.RunEndpoints.DefaultApiBase.
  var API_BASE = "{{API_BASE}}";
  var MIN = 60000, HR = 3600000, DAY = 86400000;
  var PAGE_SIZE = 50;
  var TOAST_MS = 2600;
  var toastTimer = null;

  // ---------- preview mode ----------
  // Active only when the {{API_BASE}} placeholder was NOT replaced — i.e. this file was opened
  // directly in a browser rather than served through MapJobRunsUi. Installs a fetch shim over
  // sample data so the page can be developed and reviewed standalone. Dead code in production.
  if (API_BASE.charAt(0) === "{") (function () {
    function iso(ms) { return new Date(Date.now() + ms).toISOString(); }
    var stats = { enqueued: 3, processing: 3, scheduled: 4, succeeded: 1284, failed: 2, deleted: 12, servers: 2 };
    var lists = {
      enqueued: [
        { id: "882540", jobDisplayName: "PaymentJobs.RetryFailedPayments", enqueuedAt: iso(-40 * 1000) },
        { id: "882541", jobDisplayName: "NotificationJobs.SendLoanApprovedEmail", enqueuedAt: iso(-2 * MIN) },
        { id: "882542", jobDisplayName: "QuoteJobs.ExpireStaleQuotes", enqueuedAt: iso(-5 * MIN) },
      ],
      processing: [
        { id: "882535", jobDisplayName: "LedgerJobs.ReconcileLoanBook", serverId: "app-01:4821", startedAt: iso(-14 * MIN),
          beat: { lastBeatAt: iso(-9 * 1000), percent: 62.5, message: "loan book batch 5/8", timeoutSeconds: 300, overdue: false, stalled: false, acknowledged: false } },
        { id: "882538", jobDisplayName: "ReportingJobs.GenerateMonthlyStatements", serverId: "app-02:4822", startedAt: iso(-90 * 1000),
          beat: { lastBeatAt: iso(-80 * 1000), percent: null, message: null, timeoutSeconds: 60, overdue: true, stalled: false, acknowledged: false } },
        { id: "882539", jobDisplayName: "LedgerJobs.RebuildPositions", serverId: "app-02:4822", startedAt: iso(-40 * MIN),
          beat: { lastBeatAt: iso(-12 * MIN), percent: 35, message: "positions batch 7/20", timeoutSeconds: 300, overdue: true, stalled: true, acknowledged: false } },
      ],
      scheduled: [
        { id: "882545", jobDisplayName: "CreditJobs.RefreshBureauFiles", enqueueAt: iso(2 * HR) },
        { id: "882546", jobDisplayName: "ReportingJobs.SendDailyAllClear", enqueueAt: iso(5 * HR) },
        { id: "882547", jobDisplayName: "PaymentJobs.SweepSettlements", enqueueAt: iso(9 * HR) },
        { id: "882548", jobDisplayName: "QuoteJobs.ExpireStaleQuotes", enqueueAt: iso(3 * HR) },

        { id: "882534", jobDisplayName: "NotificationJobs.SendLoanApprovedEmail", succeededAt: iso(-22 * MIN), durationMs: 620 },
        { id: "882530", jobDisplayName: "ReportingJobs.SendDailyAllClear", succeededAt: iso(-19 * HR), durationMs: 12800 },
      ],
      failed: [
        { id: "882130", jobDisplayName: "CreditJobs.RefreshBureauFiles", failedAt: iso(-3 * HR), exceptionType: "System.Net.Http.HttpRequestException", exceptionMessage: "Response status code does not indicate success: 503 (Service Unavailable)." },
        { id: "881904", jobDisplayName: "LedgerJobs.ReconcileLoanBook", failedAt: iso(-37 * HR), exceptionType: "Npgsql.NpgsqlException", exceptionMessage: "Exception while reading from stream" },
      ],
      deleted: [
        { id: "882501", jobDisplayName: "LedgerJobs.ReconcileLoanBook", deletedAt: iso(-25 * MIN), cancelled: true, cancelledBy: "m.chen", cancelledAt: iso(-25 * MIN), stallPhase: null },
        { id: "882440", jobDisplayName: "ReportingJobs.GenerateMonthlyStatements", deletedAt: iso(-50 * MIN), cancelled: true, cancelledBy: "system:liveness", cancelledAt: iso(-50 * MIN), stallPhase: "blocked" },
        { id: "882388", jobDisplayName: "QuoteJobs.ExpireStaleQuotes", deletedAt: iso(-4 * HR), cancelled: false, stallPhase: null },
      ],
      servers: [
        { name: "app-01:4821", workersCount: 20, queues: ["critical", "default"], startedAt: iso(-6 * DAY), heartbeat: iso(-8 * 1000) },
        { name: "app-02:4822", workersCount: 20, queues: ["default"], startedAt: iso(-2 * DAY), heartbeat: iso(-12 * 1000) },
      ],
    };
    var queues = [{ name: "default", length: 3 }, { name: "critical", length: 0 }];
    var stalledSample = {
      detector: { status: "healthy", lastScanAt: iso(-6 * 1000), servers: [{ serverId: "app-01:4821:detector", lastScanAt: iso(-6 * 1000), scanIntervalSeconds: 30, fresh: true }] },
      activeContractCount: 2,
      acknowledgedCount: 0,
      unacknowledgedCount: 1,
      items: [{
        id: "882539", jobDisplayName: "LedgerJobs.RebuildPositions", executionId: "a41f09c2", serverId: "app-02:4822",
        startedAt: iso(-40 * MIN), stalledAt: iso(-7 * MIN), lastBeatAt: iso(-12 * MIN), seq: 8, percent: 35,
        message: "positions batch 7/20", timeoutSeconds: 300, acknowledged: false, acknowledgedBy: null, acknowledgedAt: null, acknowledgeReason: null,
      }],
    };
    var auditByJob = {
      "882501": [
        { at: iso(-24 * MIN), actor: "worker", action: "cancel-ack", jobId: "882501", reason: null, outcome: "ok", detail: { result: "aborted", elapsedMs: "2900" } },
        { at: iso(-25 * MIN), actor: "m.chen", action: "cancel", jobId: "882501", reason: "Stuck reconciliation — killing before it retries", outcome: "ok" },
      ],
    };
    function findName(id) {
      var name = null;
      Object.keys(lists).forEach(function (k) {
        lists[k].forEach(function (r) { if (r.id === id && r.jobDisplayName) name = r.jobDisplayName; });
      });
      return name || "SampleJobs.Run";
    }
    function detailFor(id) {
      var props = { "CurrentCulture": "en-AU", "RetryCount": "0" };
      var history = [{ stateName: "Enqueued", createdAt: iso(-30 * MIN), reason: "Triggered by recurring job scheduler", data: { queue: "default" } }];

        props["JobControl.CancelRequested"] = JSON.stringify({ v: 1, by: "m.chen", at: iso(-25 * MIN), reason: "Stuck reconciliation — killing before it retries" });

          { stateName: "Deleted", createdAt: iso(-25 * MIN), reason: "Cancelled by m.chen", data: {} },
          { stateName: "Processing", createdAt: iso(-55 * MIN), reason: null, data: { serverId: "app-01:4821" } },
          { stateName: "Enqueued", createdAt: iso(-56 * MIN), reason: null, data: { queue: "default" } },

      }
      return { id: id, jobDisplayName: findName(id), createdAt: iso(-1 * HR), expireAt: iso(23 * HR), properties: props, history: history };
    }
    function ok(data) {
      return Promise.resolve({ ok: true, status: 200, json: function () { return Promise.resolve(data); }, text: function () { return Promise.resolve(""); } });
    }
    window.fetch = function (url, opts) {

    }
    if (row.cancelled) {
      return '<td class="actions-cell" data-stop-row-click="1"><span style="font-size:12px;color:var(--text-tertiary)">Open to requeue</span></td>';
    }
    return '<td class="actions-cell" data-stop-row-click="1">' + requeueButton("deleted", row.id) + '</td>';
  }

  // Mirrors the API's own guard-free stance (§3.2: "the API itself always allows the requeue ... the
  // guard is a UI affordance") — disabled while a cancel marker has no ack yet, unless it's old enough
  // that the ack is never coming (worker died mid-body).
  function requeueGuard(marker, auditEntries) {
    if (!marker) return { disabled: false };
    var acked = auditEntries.some(function (e) { return e.action === "cancel-ack"; });
    if (acked) return { disabled: false };
    var ageMs = Date.now() - new Date(marker.at).getTime();
    return ageMs >= TEN_MINUTES_MS ? { disabled: false, stale: true } : { disabled: true };
  }

  function jobCell(id, jobDisplayName) {
    return '<div class="job-cell"><div class="job-id">' + escapeHtml(id) + '</div>' +
      '<div class="job-method">' + escapeHtml(jobDisplayName || "not available") + '</div></div>';
  }

  function timeCell(iso) {
    if (!iso) return '<span style="color:var(--text-tertiary)">—</span>';
    return '<div>' + escapeHtml(fmtRel(iso)) + '</div><div class="cell-abs">' + escapeHtml(fmtAbs(iso)) + '</div>';
  }

  function renderRow(tab, row) {
    if (tab === "servers") {
      return '<tr>' +
        '<td>' + escapeHtml(row.name) + '</td>' +
        '<td>' + row.workersCount + '</td>' +
        '<td>' + escapeHtml((row.queues || []).join(", ")) + '</td>' +
        '<td>' + timeCell(row.startedAt) + '</td>' +
        '<td>' + timeCell(row.heartbeat) + '</td>' +
        '</tr>';
    }

    var id = escapeAttr(row.id);
    var openAttrs = 'data-action="open-detail" data-id="' + id + '"';
    var actionsCell = actionsCellFor(tab, row.id);
    switch (tab) {
      case "enqueued":
        return '<tr ' + openAttrs + '><td>' + jobCell(row.id, row.jobDisplayName) + '</td><td>' + timeCell(row.enqueuedAt) + '</td>' + actionsCell + '</tr>';
      case "processing":
        return '<tr ' + openAttrs + '><td>' + jobCell(row.id, row.jobDisplayName) + '</td>' +
          '<td>' + escapeHtml(row.serverId || "—") + '</td><td>' + timeCell(row.startedAt) + '</td>' +
          '<td>' + escapeHtml(fmtRunningSince(row.startedAt)) + '</td>' + beatCell(row.beat) + processingActionsCell(row) + '</tr>';
      case "scheduled":
        return '<tr ' + openAttrs + '><td>' + jobCell(row.id, row.jobDisplayName) + '</td><td>' + timeCell(row.enqueueAt) + '</td>' + actionsCell + '</tr>';
      case "succeeded":
        return '<tr ' + openAttrs + '><td>' + jobCell(row.id, row.jobDisplayName) + '</td>' +
          '<td>' + timeCell(row.succeededAt) + '</td><td>' + escapeHtml(fmtDuration(row.durationMs)) + '</td>' + actionsCell + '</tr>';
      case "failed":
        return '<tr ' + openAttrs + '><td>' + jobCell(row.id, row.jobDisplayName) + '</td>' +
          '<td>' + timeCell(row.failedAt) + '</td>' +
          '<td><div class="exc-type">' + escapeHtml(row.exceptionType || "") + '</div>' +
          '<div class="exc-message" title="' + escapeAttr(row.exceptionMessage || "") + '">' + escapeHtml(row.exceptionMessage || "") + '</div></td>' + actionsCell + '</tr>';
      case "deleted":
        return '<tr ' + openAttrs + '><td>' + jobCell(row.id, row.jobDisplayName) + '</td><td>' + timeCell(row.deletedAt) + '</td>' +
          '<td>' + deletedStatusCell(row) + '</td>' + deletedActionsCell(row) + '</tr>';
      default:
        return "";
    }
  }

  // Liveness beat for a Processing row (null for any job without a [Heartbeat] contract — the "—"
  // keeps legacy rows visually unchanged). `overdue` is the API's wall-clock display hint that a beat
  // is late the moment it happens; `stalled` is the detector's authoritative verdict (confirmed on its
  // own observation clock) and outranks the hint in this cell.
  function beatCell(beat) {
    if (!beat) return '<td><span style="color:var(--text-tertiary)">—</span></td>';
    var html = '<td>';
    var pctText = "";
    if (beat.percent != null) {
      var pct = Math.max(0, Math.min(100, beat.percent));
      pctText = Math.round(pct) + "% · ";
      html += '<div class="beat-bar-track"><div class="beat-bar-fill" style="width:' + pct + '%' + (beat.stalled ? ';background:var(--danger-text)' : '') + '"></div></div>';
    }
    if (beat.message) {
      html += '<div class="beat-message" title="' + escapeAttr(beat.message) + '">' + escapeHtml(beat.message) + '</div>';
    }
    if (beat.stalled) {
      html += '<div class="beat-meta"><span class="pill pill-danger">' + icon("error", 12) + 'Stalled</span>' +
        (beat.acknowledged ? '<span class="pill pill-neutral" style="margin-left:6px">Acknowledged</span>' : '') +
        ' <span class="beat-overdue" style="color:var(--danger-text)">last beat ' + escapeHtml(fmtRel(beat.lastBeatAt) || "") + '</span></div>';
    } else {
      html += '<div class="beat-meta">' + (beat.overdue
        ? '<span class="beat-overdue">beat overdue — last ' + escapeHtml(fmtRel(beat.lastBeatAt) || "") + '</span>'
        : escapeHtml(pctText + "beat " + (fmtRel(beat.lastBeatAt) || ""))) + '</div>';
    }
    return html + '</td>';
  }

  // stallPhase is the §5 retry workflow's verdict for a stall-cancelled row: "blocked" (no ack — the
  // body's fate is unknowable, requeue is guarded), "exhausted" (acknowledged but the retry budget is
  // spent), "cancel-requested" (ack still pending). Other phases never show on this tab (the job left
  // Deleted with them).
  function deletedStatusCell(row) {
    if (!row.cancelled) return '<span class="pill pill-neutral">Deleted</span>';
    var html = '<span class="pill pill-warning">' + icon("block", 12) + 'Cancelled</span>';
    if (row.stallPhase === "blocked") {
      html += ' <span class="pill pill-danger">' + icon("error", 12) + 'Stall blocked</span>';
    } else if (row.stallPhase === "exhausted") {
      html += ' <span class="pill pill-danger">' + icon("error", 12) + 'Retries exhausted</span>';
    } else if (row.stallPhase === "cancel-requested") {
      html += ' <span class="pill pill-neutral">Awaiting ack</span>';
    }
    html += '<div class="pill-sub">by ' + escapeHtml(row.cancelledBy || "unknown") + ' · ' + escapeHtml(fmtRel(row.cancelledAt) || "") + '</div>';
    return html;
  }

  function renderDrawer() {
    var settled = state.drawerSettled ? " settled" : "";
    state.drawerSettled = true;
    var html = '<div class="scrim' + settled + '" data-action="close-detail"></div><aside class="drawer' + settled + '">';
    html += '<div class="drawer-head"><div class="drawer-title-row"><div style="min-width:0">' +
      '<h3 class="drawer-title">' + escapeHtml(state.detailId) +
      ' <button class="copy-id-btn" data-action="copy-id" title="Copy job ID">' + icon("contentCopy", 15) + '</button></h3>' +
      '<div class="drawer-method">' + escapeHtml((state.detail && state.detail.jobDisplayName) || "") + '</div></div>' +
      '<button class="drawer-close" data-action="close-detail">' + icon("close", 20) + '</button></div></div>';

    html += '<div class="drawer-body">';
    if (state.detailError) {
      html += '<div style="color:var(--danger-text);font-size:13px">' + escapeHtml(state.detailError) + '</div>';
    } else if (state.detailLoading || !state.detail) {
      html += '<div style="color:var(--text-tertiary);font-size:13px">Loading…</div>';
    } else {
      var d = state.detail;
      var actionRow = renderDrawerActionRow(d);
      if (actionRow) html += actionRow;

      var marker = parseCancelMarker(d.properties);
      if (marker) html += renderCancelPanel(marker);

      html += '<dl class="def-list">';
      html += '<div><dt>Created</dt><dd>' + escapeHtml(fmtAbs(d.createdAt)) + '</dd></div>';
      html += '<div><dt>Expires</dt><dd>' + (d.expireAt ? escapeHtml(fmtAbs(d.expireAt)) : '<span style="color:var(--text-tertiary)">—</span>') + '</dd></div>';
      html += '</dl>';

      var props = d.properties || {};
      var propKeys = Object.keys(props).filter(function (k) { return k !== CANCEL_MARKER_KEY; });
      if (propKeys.length > 0) {
        html += '<div class="drawer-section-title">' + icon("dns", 15) + 'Parameters</div>';
        html += '<dl class="def-list">';
        propKeys.forEach(function (k) {
          html += '<div><dt>' + escapeHtml(k) + '</dt><dd>' + escapeHtml(props[k]) + '</dd></div>';
        });
        html += '</dl>';
      }

      html += '<div class="drawer-section-title">' + icon("history", 15) + 'State history</div>';
      var history = d.history || [];
      if (history.length === 0) {
        html += '<div style="color:var(--text-tertiary);font-size:13px">No history recorded.</div>';
      } else {
        history.forEach(function (h) { html += renderHistoryItem(h); });
      }
    }
    html += '</div></aside>';
    return html;
  }

  // Mirrors actionsCellFor/deletedActionsCell's per-tab action set, but for the drawer — where a
  // cancelled Deleted-tab job's Requeue can apply the real ack-aware guard (§3.2), since the drawer is
  // already polling this job's own audit entries (state.detailAudit) for the cancel panel below.
  function renderDrawerActionRow(d) {
    var tab = state.detailTab;
    var buttons = "";
    if (CANCELLABLE_TABS[tab]) buttons += cancelButton(tab, d.id);
    if (REQUEUEABLE_TABS[tab] && tab !== "deleted") buttons += requeueButton(tab, d.id);
    if (DELETABLE_TABS[tab]) buttons += deleteButton(tab, d.id);
    if (tab === "deleted") {
      // The list row carries the §5 stall phase — an unacknowledged stall-cancel's (cancel-requested or
      // blocked, OPS-003) only exit is the audited break-glass (the API refuses its ordinary requeue
      // outright, so offering that button would be a lie).
      var listRow = tabState("deleted").rows.filter(function (r) { return r.id === d.id; })[0];
      if (listRow && (listRow.stallPhase === "blocked" || listRow.stallPhase === "cancel-requested")) {
        buttons += '<button class="btn-ghost-ring" data-action="ask-force-requeue" data-id="' + escapeAttr(d.id) + '" style="color:var(--danger-text)">' +
          icon("replay", 15) + 'Force requeue</button>';
        return '<div class="drawer-action-row">' + buttons + '</div>';
      }
      var marker = parseCancelMarker(d.properties);
      var guard = requeueGuard(marker, state.detailAudit.entries);
      if (guard.disabled) {
        buttons += '<button class="btn-ghost-ring" disabled title="Waiting for the body to acknowledge the cancel before allowing requeue">' + icon("replay", 15) + 'Requeue</button>';
      } else {
        buttons += requeueButton("deleted", d.id);
        if (guard.stale) buttons += '<span class="pill-sub" style="align-self:center;margin-left:8px">no ack after 10 min — requeue with care</span>';
      }
    }
    return buttons ? '<div class="drawer-action-row">' + buttons + '</div>' : "";
  }

  function renderHistoryItem(h) {
    var html = '<div class="history-item"><div class="history-item-head">' + statePill(h.stateName) +
      '<span style="font-size:11.5px;color:var(--text-tertiary)">' + escapeHtml(fmtAbs(h.createdAt)) + '</span></div>';
    if (h.reason) html += '<div class="history-reason">' + escapeHtml(h.reason) + '</div>';
    var data = h.data || {};
    var dataKeys = Object.keys(data);
    if (dataKeys.length > 0) {
      html += '<div class="history-data">';
      dataKeys.forEach(function (k) { html += '<span class="history-data-chip">' + escapeHtml(k) + '=' + escapeHtml(data[k]) + '</span>'; });
      html += '</div>';
    }
    html += '</div>';
    return html;
  }

  function renderToast() {
    return '<div class="toast">' + icon(state.toast.icon, 18) + escapeHtml(state.toast.message) + '</div>';
  }

  // marker: {v, by, at, reason} (§2.1). Live status is resolved from this job's own audit entries
  // (§3.4: "requested by/at/why, then live status ... resolved by polling that job's audit entries") —
  // "stopping…" until a cancel-ack lands, then aborted/completed-anyway/faulted per §2.3.
  function renderCancelPanel(marker) {
    var ack = state.detailAudit.entries.filter(function (e) { return e.action === "cancel-ack"; })[0];
    var statusText, statusColor;
    if (!ack) {
      statusText = "Stopping…";
      statusColor = "var(--text-tertiary)";
    } else {
      var result = ack.detail && ack.detail.result;
      if (result === "aborted") {
        var elapsed = ack.detail.elapsedMs != null ? fmtDuration(Number(ack.detail.elapsedMs)) : null;
        statusText = "Stopped" + (elapsed ? " after " + elapsed : "");
        statusColor = "var(--positive-text)";
      } else if (result === "completed-anyway") {
        statusText = "Completed anyway — this job isn't cancellation-safe";
        statusColor = "var(--warning-text)";
      } else {
        statusText = "Faulted" + (ack.detail && ack.detail.exception ? " (" + ack.detail.exception + ")" : "");
        statusColor = "var(--danger-text)";
      }
    }

    var html = '<div class="cancel-panel">';
    html += '<div class="cancel-panel-head">' + icon("block", 16) + '<strong style="font-size:13px">Cancellation requested</strong></div>';
    html += '<div class="cancel-panel-meta">by ' + escapeHtml(marker.by || "unknown") + ' · ' + escapeHtml(fmtAbs(marker.at)) + '</div>';
    if (marker.reason) html += '<div class="cancel-panel-reason">' + escapeHtml(marker.reason) + '</div>';
    html += '<div class="cancel-panel-status" style="color:' + statusColor + '">' + escapeHtml(statusText) + '</div>';
    html += '</div>';
    return html;
  }

  function renderCancelModal() {
    var m = state.cancelModal;
    var reasonValid = state.cancelReasonDraft.trim().length > 0;
    var settledCls = state.modalSettled ? " settled" : "";
    state.modalSettled = true;
    var html = '<div class="modal-scrim' + settledCls + '"><div class="modal-box">';
    html += '<div class="modal-head"><div class="modal-icon" style="background:var(--danger-bg)">' + icon("block", 22) + '</div>' +
      '<div><h3 class="modal-title">Cancel ' + escapeHtml(m.jobId) + '</h3>' +
      '<p class="modal-body-text">Requests a stop: the job moves to <b>Deleted</b> immediately' +
      (m.expectedState === "Processing" ? ', and its running body is asked to stop within a few seconds. A job body that never checks for cancellation runs to completion regardless — that gets recorded too.' : '.') +
      '</p></div></div>';
    html += '<div style="margin-top:18px"><div class="reason-label">Reason <span style="color:var(--danger-text)">*</span></div>' +
      '<textarea id="cancel-reason-input" class="reason-input" data-action="cancel-reason-input" rows="3" placeholder="e.g. Stuck payrun — killing before it retries">' + escapeHtml(state.cancelReasonDraft) + '</textarea></div>';
    if (state.cancelModalError) html += '<div class="modal-error">' + escapeHtml(state.cancelModalError) + '</div>';
    html += '<div class="modal-footer"><button class="btn-text" data-action="close-cancel-modal">Back</button>' +
      '<button class="btn-danger-fill" data-action="confirm-cancel"' + (!reasonValid || state.cancelModalBusy ? " disabled" : "") + '>Cancel job</button></div>';
    html += '</div></div>';
    return html;
  }

  // Requeue/Run now/Delete confirmation — reason is optional for those (§3.2), unlike Cancel's.
  // Acknowledge (a stall acknowledgment, review F8) and Force requeue (the §5 Rule-4 break-glass)
  // require one: the reason is recorded on the flag / in the audit trail.
  function renderActionModal() {
    var m = state.actionModal;
    var isDelete = m.kind === "delete";
    var isAcknowledge = m.kind === "acknowledge";
    var isForceRequeue = m.kind === "force-requeue";
    var verb = isDelete ? "Delete" : isAcknowledge ? "Acknowledge stall" : isForceRequeue ? "Force requeue"
      : (m.expectedState === "Scheduled" ? "Run now" : "Requeue");
    var iconName = isDelete ? "delete" : isAcknowledge ? "checkCircle" : "replay";
    var iconBg = isDelete || isForceRequeue ? "var(--danger-bg)" : isAcknowledge ? "var(--warning-bg)" : "var(--info-bg)";
    var bodyText;
    if (isForceRequeue) {
      bodyText = "This job's stall-cancel was <b>never acknowledged</b> — its body's fate is unknowable, and it may " +
        "still be running. Force-requeuing risks a <b>duplicate execution</b> (and the old body's eventual exit can " +
        "clobber the new run's state). Recycle the owning worker process first if you can. This action is audited.";
    } else if (isAcknowledge) {
      bodyText = "Records that someone is looking at this stalled execution — alerting counts unacknowledged stalls only. " +
        "The stalled flag itself <b>stays</b> (the heartbeat really is overdue) and retires on its own when beats resume or the run ends.";
    } else if (isDelete) {
      bodyText = "Removes this run from the " + escapeHtml(m.expectedState) + " list permanently.";
    } else if (m.expectedState === "Succeeded") {
      bodyText = "Re-runs this job from the start. <b>The job already completed once</b> — only requeue if running it again is safe (idempotent).";
    } else if (m.expectedState === "Scheduled") {
      bodyText = "Runs this job now instead of waiting for its scheduled time.";
    } else {
      bodyText = "Re-enqueues this job to run again.";
    }

    var html = '<div class="modal-scrim' + (state.modalSettled ? " settled" : "") + '"><div class="modal-box">';
    state.modalSettled = true;
    html += '<div class="modal-head"><div class="modal-icon" style="background:' + iconBg + '">' + icon(iconName, 22) + '</div>' +
      '<div><h3 class="modal-title">' + escapeHtml(verb) + ' ' + escapeHtml(m.jobId) + '</h3>' +
      '<p class="modal-body-text">' + bodyText + '</p></div></div>';
    var reasonRequired = isAcknowledge || isForceRequeue;
    html += '<div style="margin-top:18px"><div class="reason-label">Reason ' +
      (reasonRequired ? '<span style="color:var(--danger-text)">*</span>' : '(optional)') + '</div>' +
      '<textarea id="action-reason-input" class="reason-input" data-action="action-reason-input" rows="2" placeholder="' +
      (isForceRequeue ? 'e.g. Worker recycled at 14:02 — safe to re-run'
        : isAcknowledge ? 'e.g. Investigating — looks like a hung upstream call' : 'Optional context for the audit trail') +
      '">' + escapeHtml(state.actionReasonDraft) + '</textarea></div>';
    if (state.actionModalError) html += '<div class="modal-error">' + escapeHtml(state.actionModalError) + '</div>';
    var confirmDisabled = state.actionModalBusy || (reasonRequired && state.actionReasonDraft.trim().length === 0);
    html += '<div class="modal-footer"><button class="btn-text" data-action="close-action-modal">Back</button>' +
      '<button class="' + (isDelete || isForceRequeue ? "btn-danger-fill" : "btn-navy-fill") + '" data-action="confirm-action"' + (confirmDisabled ? " disabled" : "") + '>' + escapeHtml(verb) + '</button></div>';
    html += '</div></div>';
    return html;
  }

  // ---------- data loading ----------
  function apiGet(path) {
    return fetch(API_BASE + path, { credentials: "same-origin" }).then(function (res) {
      if (!res.ok) throw new Error("Request failed (HTTP " + res.status + ")");
      return res.json();
    }).then(normalizeKeys);
  }

  function loadStats() {
    apiGet("/stats")
      .then(function (stats) { state.stats = stats; state.statsError = null; render(); })
      .catch(function (err) { state.statsError = err.message; render(); });
  }

  // Detector health + flags for the Processing tab (degraded hint, stalled badges' companion data).
  // Loaded alongside the tab rather than per row — the stalled flags themselves ride on each row's beat.
  function loadStalledInfo() {
    apiGet("/stalled")
      .then(function (info) { state.stalledInfo = info; render(); })
      .catch(function () { /* transient — the next load/poll retries; the hint just lags */ });
  }

  function loadQueues(thenSelect) {
    apiGet("/queues")
      .then(function (queues) {
        state.queues = queues;
        state.queuesError = null;
        // A queue restored from the URL may no longer exist — fall back rather than filter on it.
        if (state.selectedQueue && !queues.some(function (q) { return q.name === state.selectedQueue; })) {
          state.selectedQueue = queues.length > 0 ? queues[0].name : null;
        }
        if (thenSelect && !state.selectedQueue && queues.length > 0) state.selectedQueue = queues[0].name;
        render();
        if (state.tab === "enqueued") loadTab("enqueued", true);
      })
      .catch(function (err) { state.queuesError = err.message; render(); });
  }

  function tabPath(tab, from) {
    if (tab === "servers") return "/servers";
    if (tab === "enqueued") return "/enqueued?queue=" + encodeURIComponent(state.selectedQueue || "") + "&from=" + from + "&count=" + PAGE_SIZE;
    return "/" + tab + "?from=" + from + "&count=" + PAGE_SIZE;
  }

  function loadTab(tab, reset) {
    var t = tabState(tab);
    if (reset) { t.rows = []; t.exhausted = false; t.loadError = null; }
    if (tab === "enqueued" && !state.selectedQueue) return; // queue picker not ready yet
    if (tab === "processing") loadStalledInfo();
    t.loading = true;
    render();
    var from = t.rows.length;
    apiGet(tabPath(tab, from))
      .then(function (rows) {
        t.rows = t.rows.concat(rows);
        t.exhausted = tab === "servers" || rows.length < PAGE_SIZE;
        t.loading = false;
        render();
      })
      .catch(function (err) {
        t.loading = false;
        t.loadError = err.message;
        render();
      });
  }

  function loadDetail(id) {
    state.detail = null;
    state.detailError = null;
    state.detailLoading = true;
    render();
    apiGet("/" + encodeURIComponent(id))
      .then(function (detail) {
        if (state.detailId !== id) return; // drawer moved on meanwhile
        state.detail = detail;
        state.detailLoading = false;
        render();
        // Only start polling audit once we know there's something to poll for — a plain-deleted or
        // not-yet-cancelled job has no cancel-ack coming.
        if (parseCancelMarker(detail.properties)) loadDetailAudit(id);
      })
      .catch(function (err) {
        if (state.detailId !== id) return;
        state.detailLoading = false;
        state.detailError = err.message;
        render();
      });
  }

  // Polls this job's own audit trail (§3.4: "resolved by polling that job's audit entries") — reschedules
  // itself every 2.5s until a cancel-ack shows up, so the drawer's "Stopping…" resolves live without a
  // manual refresh. Stops on its own once acknowledged, or if the drawer moves to a different job.
  function loadDetailAudit(id) {
    state.detailAudit.loading = state.detailAudit.entries.length === 0;
    render();
    apiGet("/" + encodeURIComponent(id) + "/audit")
      .then(function (entries) {
        if (state.detailId !== id) return;
        state.detailAudit.entries = entries;
        state.detailAudit.loading = false;
        state.detailAudit.loadError = null;
        render();
        var acknowledged = entries.some(function (e) { return e.action === "cancel-ack"; });
        if (!acknowledged && state.detail && parseCancelMarker(state.detail.properties)) {
          setTimeout(function () { if (state.detailId === id) loadDetailAudit(id); }, 2500);
        }
      })
      .catch(function (err) {
        if (state.detailId !== id) return;
        state.detailAudit.loading = false;
        state.detailAudit.loadError = err.message;
        render();
      });
  }

  function apiPost(id, action, body) {
    return fetch(API_BASE + "/" + encodeURIComponent(id) + "/" + action, {
      method: "POST",
      credentials: "same-origin",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body || {}),
    }).then(function (res) {
      if (!res.ok) return res.text().then(function (t) { throw new Error(t || ("Request failed with HTTP " + res.status)); });
    });
  }

  function confirmCancel() {
    var m = state.cancelModal;
    var reason = state.cancelReasonDraft.trim();
    if (!reason) return;
    state.cancelModalBusy = true;
    state.cancelModalError = null;
    render();
    apiPost(m.jobId, "cancel", { reason: reason, expectedState: m.expectedState })
      .then(function () {
        state.cancelModal = null;
        state.cancelModalBusy = false;
        loadStats();
        loadTab(state.tab, true);
        if (state.detailId === m.jobId) loadDetail(m.jobId);
        showToast("Cancel requested for '" + m.jobId + "'", "block");
      })
      .catch(function (err) {
        state.cancelModalBusy = false;
        state.cancelModalError = err.message;
        render();
      });
  }

  function confirmAction() {
    var m = state.actionModal;
    var reason = state.actionReasonDraft.trim();
    // Required for acknowledge and force-requeue — the button is disabled, this is the keyboard path.
    if ((m.kind === "acknowledge" || m.kind === "force-requeue") && !reason) return;
    var wireAction = m.kind === "delete" ? "delete" : m.kind === "acknowledge" ? "acknowledge-stall"
      : m.kind === "force-requeue" ? "force-requeue" : "requeue";
    state.actionModalBusy = true;
    state.actionModalError = null;
    render();
    apiPost(m.jobId, wireAction, m.kind === "acknowledge"
        ? { reason: reason }
        : { reason: reason || null, expectedState: m.expectedState })
      .then(function () {
        state.actionModal = null;
        state.actionModalBusy = false;
        loadStats();
        loadTab(state.tab, true);
        if (m.kind === "acknowledge") {
          // The flag stays; only its acknowledgment state changed — no drawer reset needed.
          showToast("Stall acknowledged for '" + m.jobId + "'", "checkCircle");
          return;
        }
        if (state.detailId === m.jobId) {
          // The job's state (and, for requeue, its cancel marker) just changed — reload rather than
          // patch the drawer in place.
          state.detailId = null;
          state.detail = null;
          state.detailTab = null;
        }
        showToast((m.kind === "delete" ? "Deleted '" : "Requeued '") + m.jobId + "'", m.kind === "delete" ? "delete" : "replay");
      })
      .catch(function (err) {
        state.actionModalBusy = false;
        state.actionModalError = err.message;
        render();
      });
  }

  function showToast(message, iconName) {
    state.toast = { message: message, icon: iconName || "checkCircle" };
    render();
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { state.toast = null; render(); }, TOAST_MS);
  }

  function focusReason(inputId) {
    var el = document.getElementById(inputId);
    if (el) el.focus();
  }

  // ---------- event delegation ----------
  document.addEventListener("click", function (event) {
    // Background dismiss: only when the click lands directly on the scrim itself, not a bubbled click
    // from inside .modal-box (nested inside .modal-scrim for centering) — same rule as recurring.html.
    if (event.target.classList && event.target.classList.contains("modal-scrim")) {
      state.cancelModal = null;
      state.cancelModalError = null;
      state.actionModal = null;
      state.actionModalError = null;
      render();
      return;
    }

    var target = event.target.closest("[data-action]");
    if (!target) return;
    var action = target.getAttribute("data-action");
    var id = target.getAttribute("data-id");

    // Row action buttons live inside a clickable <tr> — don't also open the drawer.
    if (target.closest("[data-stop-row-click]") && action !== "open-detail") event.stopPropagation();

    switch (action) {
      case "refresh":
        loadStats();
        loadQueues(false);
        loadTab(state.tab, true);
        showToast("Reloaded", "refresh");
        break;
      case "select-tab":
        state.tab = target.getAttribute("data-tab");
        syncUrl();
        render();
        if (state.tab !== "enqueued" || state.selectedQueue) loadTab(state.tab, tabState(state.tab).rows.length === 0);
        break;
      case "load-more":
        loadTab(state.tab, false);
        break;
      case "open-detail":
        state.detailId = id;
        state.detailTab = state.tab;
        state.detailAudit = { entries: [], loading: false, loadError: null };
        state.drawerSettled = false;
        loadDetail(id);
        break;
      case "close-detail":
        state.detailId = null;
        state.detail = null;
        state.detailTab = null;
        render();
        break;
      case "ask-cancel":
        state.cancelModal = { jobId: id, expectedState: target.getAttribute("data-expected-state") };
        state.cancelReasonDraft = "";
        state.cancelModalError = null;
        state.modalSettled = false;
        render();
        focusReason("cancel-reason-input");
        break;
      case "close-cancel-modal":
        state.cancelModal = null;
        state.cancelModalError = null;
        render();
        break;
      case "confirm-cancel":
        confirmCancel();
        break;
      case "ask-requeue":
        state.actionModal = { kind: "requeue", jobId: id, expectedState: target.getAttribute("data-expected-state") };
        state.actionReasonDraft = "";
        state.actionModalError = null;
        state.modalSettled = false;
        render();
        focusReason("action-reason-input");
        break;
      case "ask-acknowledge":
        state.actionModal = { kind: "acknowledge", jobId: id, expectedState: null };
        state.actionReasonDraft = "";
        state.actionModalError = null;
        state.modalSettled = false;
        render();
        focusReason("action-reason-input");
        break;
      case "ask-force-requeue":
        state.actionModal = { kind: "force-requeue", jobId: id, expectedState: "Deleted" };
        state.actionReasonDraft = "";
        state.actionModalError = null;
        state.modalSettled = false;
        render();
        focusReason("action-reason-input");
        break;
      case "toggle-stalled-only":
        state.stalledOnly = !state.stalledOnly;
        render();
        break;
      case "ask-delete-run":
        state.actionModal = { kind: "delete", jobId: id, expectedState: target.getAttribute("data-expected-state") };
        state.actionReasonDraft = "";
        state.actionModalError = null;
        state.modalSettled = false;
        render();
        focusReason("action-reason-input");
        break;
      case "close-action-modal":
        state.actionModal = null;
        state.actionModalError = null;
        render();
        break;
      case "confirm-action":
        confirmAction();
        break;
      case "copy-id":
        if (navigator.clipboard && state.detailId) {
          navigator.clipboard.writeText(state.detailId).then(function () { showToast("Job ID copied", "checkCircle"); });
        }
        break;
    }
  });

  document.addEventListener("change", function (event) {
    if (event.target.getAttribute("data-action") === "select-queue") {
      state.selectedQueue = event.target.value;
      syncUrl();
      loadTab("enqueued", true);
    }
  });

  document.addEventListener("input", function (event) {
    var action = event.target.getAttribute("data-action");
    if (action === "cancel-reason-input") {
      // A full render() here would tear down and recreate .modal-scrim/.modal-box, replaying their CSS
      // entrance animation on every keystroke — same flicker recurring.html's disable-reason field hit.
      // Only the confirm button's disabled state actually needs to change per keystroke.
      state.cancelReasonDraft = event.target.value;
      var confirmBtn = document.querySelector('[data-action="confirm-cancel"]');
      if (confirmBtn) confirmBtn.disabled = state.cancelReasonDraft.trim().length === 0 || state.cancelModalBusy;
    } else if (action === "action-reason-input") {
      // Reason is optional for requeue/delete — nothing else on screen depends on its content, so no
      // per-keystroke DOM patch is needed beyond capturing the draft (unlike cancel-reason-input above).
      // Acknowledge and Force requeue are the exceptions: their reasons are required, so their confirm
      // button tracks the draft.
      state.actionReasonDraft = event.target.value;
      if (state.actionModal && (state.actionModal.kind === "acknowledge" || state.actionModal.kind === "force-requeue")) {
        var ackConfirmBtn = document.querySelector('[data-action="confirm-action"]');
        if (ackConfirmBtn) ackConfirmBtn.disabled = state.actionReasonDraft.trim().length === 0 || state.actionModalBusy;
      }
    } else if (action === "job-lookup") {
      // No render needed — nothing else on screen depends on the draft; it's read on Enter.
      state.lookupDraft = event.target.value;
    }
  });

  document.addEventListener("keydown", function (event) {
    // Enter in the lookup box opens that job's drawer directly — the operator usually has an ID
    // from a log line. detailTab stays null: state is unknown, so no state-specific action buttons.
    if (event.key === "Enter" && event.target && event.target.id === "job-lookup") {
      var lookupId = state.lookupDraft.trim();
      if (lookupId) {
        state.detailId = lookupId;
        state.detailTab = null;
        state.detailAudit = { entries: [], loading: false, loadError: null };
        state.drawerSettled = false;
        loadDetail(lookupId);
      }
      return;
    }
    // Cmd/Ctrl+Enter submits the open modal (plain Enter stays a newline in the reason textarea).
    if (event.key === "Enter" && (event.metaKey || event.ctrlKey)) {
      if (state.cancelModal && state.cancelReasonDraft.trim() && !state.cancelModalBusy) { confirmCancel(); return; }
      if (state.actionModal && !state.actionModalBusy) { confirmAction(); return; }
    }
    if (event.key !== "Escape") return;
    if (state.cancelModal) { state.cancelModal = null; state.cancelModalError = null; render(); }
    else if (state.actionModal) { state.actionModal = null; state.actionModalError = null; render(); }
    else if (state.detailId) { state.detailId = null; state.detail = null; state.detailTab = null; render(); }
  });

  // "Running for" and other relative times drift — tick every 30s (Processing durations move fast).
  // Skipped while a modal is open: a full render would replay its entrance animation.
  setInterval(function () {
    if (!state.cancelModal && !state.actionModal) render();
  }, 30000);

  // Live polling: Queued / Processing / Scheduled change under an operator's feet. Refreshes the stat
  // badges and the current live tab every 8s while the page is visible. Rows are swapped in place
  // (no loading flag, so no skeleton flash); paused during modals; skipped once the user has
  // paginated past the first page so Load more results aren't collapsed.
  var LIVE_TABS = { enqueued: 1, processing: 1, scheduled: 1 };
  function pollTab(tab) {
    var t = tabState(tab);
    if (tab === "processing") loadStalledInfo();
    apiGet(tabPath(tab, 0))
      .then(function (rows) {
        if (state.tab !== tab) return;
        t.rows = rows;
        t.exhausted = rows.length < PAGE_SIZE;
        t.loadError = null;
        render();
      })
      .catch(function () { /* transient poll failure — the next tick retries */ });
  }
  setInterval(function () {
    if (document.visibilityState !== "visible" || state.cancelModal || state.actionModal) return;
    loadStats();
    if (!LIVE_TABS[state.tab]) return;
    if (state.tab === "enqueued" && !state.selectedQueue) return;
    var t = tabState(state.tab);
    if (!t.loading && t.rows.length <= PAGE_SIZE) pollTab(state.tab);
  }, 8000);

  readUrlState();
  loadStats();
  loadQueues(true);
  // loadQueues only kicks off the Queued tab once the picker is ready — a different tab restored
  // from the URL loads itself here.
  if (state.tab !== "enqueued") loadTab(state.tab, true);
})();
</script>
</body>
</html>
