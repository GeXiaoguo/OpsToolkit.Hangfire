<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hangfire Job Control — Recurring Jobs</title>
<style>
  /* Plenti Design System tokens (colors_and_type.css), inlined — this page ships as a single
     embedded HTML resource with no external asset dependencies (see the csproj comment), so
     no webfont/icon-CDN loading here; system font stack + inline SVG icons only. */
  :root {
    --navy: #002a61; --navy-hover: #05244d;
    --secondary-blue: #3c66ff; --secondary-blue-hover: #0b36d2;
    --positive-bg: #e9fcd4; --positive-text: #315e00;
    --warning-bg: #fff0d9; --warning-border: #e4b774; --warning-text: #623b02;
    --danger-bg: #fae4e4; --danger-border: #eeafaf; --danger-text: #9e0202;
    --info-bg: #cfe0f7; --info-text: #0045a5;
    --surface: #f1f2f4; --hairline: #dbdde1; --disabled-fg: #babec5;
    --text-tertiary: #5d656f; --text-secondary: #2e3238; --text-primary: #0c0d0e;
    --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
    --shadow-card: 0 1px 2px rgba(12,13,14,0.07), 0 1px 1px rgba(12,13,14,0.04);
    --shadow-dropdown: 0 8px 24px rgba(12,13,14,0.16);
    --shadow-dialog: 0 20px 56px rgba(12,13,14,0.24);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--surface); color: var(--text-primary);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased;
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 999px; border: 3px solid transparent; background-clip: padding-box; }
  button { font-family: inherit; cursor: pointer; }
  code { font-family: var(--mono); }
  @keyframes drwr { from { transform: translateX(24px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes toastin { from { transform: translate(-50%, 12px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
  @keyframes pop { from { transform: scale(0.97); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  header.topbar {
    position: sticky; top: 0; z-index: 20; background: #fff; border-bottom: 1px solid var(--hairline);
    height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px;
  }
  header.topbar h1 { font-weight: 300; font-size: 17px; letter-spacing: -0.01em; margin: 0; }
  .dash-nav { display: flex; gap: 4px; }
  .dash-nav a {
    display: inline-flex; align-items: center; height: 32px; padding: 0 14px; border-radius: 999px;
    font-size: 13px; font-weight: 600; color: var(--text-tertiary); text-decoration: none;
  }
  .dash-nav a:hover { background: var(--surface); color: var(--text-primary); }
  .dash-nav a.active { background: var(--navy); color: #fff; }

  main { max-width: 1200px; margin: 0 auto; padding: 32px 24px 96px; }

  .page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; margin-bottom: 24px; }
  .page-head h2 { font-weight: 300; font-size: 30px; line-height: 1.2; letter-spacing: -0.03em; margin: 0; }
  .page-head .subtitle { margin: 6px 0 0; font-size: 14px; color: var(--text-tertiary); }
  .head-actions { display: flex; align-items: center; gap: 10px; }
  .search-box { display: flex; align-items: center; height: 40px; padding: 0 14px; gap: 8px; background: #fff; border: 1px solid var(--hairline); border-radius: 999px; min-width: 240px; }
  .search-box svg { color: var(--text-tertiary); }
  .search-box input { flex: 1; border: none; outline: none; background: transparent; font: inherit; font-size: 14px; color: var(--text-primary); }
  .btn-outline-navy { display: inline-flex; align-items: center; gap: 8px; height: 40px; padding: 0 18px; border: none; box-shadow: inset 0 0 0 1.5px var(--navy); background: transparent; color: var(--navy); border-radius: 999px; font-weight: 600; font-size: 14px; }
  .btn-outline-navy:hover { background: rgba(0,42,97,0.06); }

  .banner { display: flex; gap: 14px; align-items: flex-start; background: var(--warning-bg); border: 1px solid var(--warning-border); border-radius: 12px; padding: 16px 18px; margin-bottom: 20px; }
  .banner-title { font-size: 14px; font-weight: 600; color: var(--warning-text); }
  .banner-body { font-size: 13px; color: var(--text-secondary); margin-top: 3px; line-height: 1.5; }
  .banner-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .banner-chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; background: #fff; border: 1px solid var(--warning-border); border-radius: 999px; font-size: 12px; font-weight: 600; color: var(--text-primary); white-space: nowrap; }
  .banner-chip:hover { background: var(--warning-bg); }

  .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-chip { display: inline-flex; align-items: center; gap: 7px; height: 34px; padding: 0 14px; border-radius: 999px; font-weight: 600; font-size: 13px; border: 1px solid var(--hairline); background: #fff; color: var(--text-secondary); }
  .filter-chip:hover { background: var(--surface); }
  .filter-chip .count { font-size: 12px; color: var(--text-tertiary); }
  .filter-chip.active { border: none; background: var(--navy); color: #fff; }
  .filter-chip.active .count { color: #fff; opacity: 0.7; }

  .table-card { background: #fff; border: 1px solid var(--hairline); border-radius: 14px; box-shadow: var(--shadow-card); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 13px 18px; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-tertiary); font-weight: 600; border-bottom: 1px solid var(--hairline); white-space: nowrap; }
  td { padding: 14px 18px; vertical-align: middle; border-bottom: 1px solid var(--hairline); }
  tbody tr { cursor: pointer; transition: background-color 0.15s ease-out; }
  tbody tr:hover { background: var(--surface); }
  tbody tr:last-child td { border-bottom: none; }
  .job-cell { display: flex; align-items: center; gap: 9px; }
  .job-dot { width: 8px; height: 8px; border-radius: 999px; flex-shrink: 0; }
  .job-id { font-size: 14px; font-weight: 600; }
  .job-method { font-family: var(--mono); font-size: 11.5px; color: var(--text-tertiary); margin-top: 2px; }
  code.cron-chip { font-size: 12.5px; background: var(--surface); padding: 2px 7px; border-radius: 5px; }
  .cron-human { font-size: 12px; color: var(--text-tertiary); margin-top: 4px; }
  .next-run-main { font-size: 13.5px; }
  .next-run-abs { font-size: 11.5px; color: var(--text-tertiary); margin-top: 2px; }
  .will-skip { display: inline-flex; align-items: center; gap: 4px; font-size: 11.5px; color: var(--warning-text); font-weight: 600; margin-top: 2px; }
  .last-none { font-size: 13px; color: var(--text-tertiary); font-style: italic; }
  .last-ok { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; white-space: nowrap; }
  .last-fail { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; color: var(--danger-text); font-weight: 600; white-space: nowrap; }
  .last-abs { font-size: 11.5px; color: var(--text-tertiary); margin-top: 2px; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 11px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .pill-positive { background: var(--positive-bg); color: var(--positive-text); }
  .pill-warning { background: var(--warning-bg); color: var(--warning-text); }
  .pill-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }
  .actions-cell { position: relative; white-space: nowrap; text-align: right; }
  .actions-inline { display: inline-flex; align-items: center; gap: 6px; }
  .btn-ghost-ring { height: 32px; padding: 0 14px; border: none; box-shadow: inset 0 0 0 1.5px var(--hairline); background: transparent; color: var(--text-secondary); border-radius: 999px; font-weight: 600; font-size: 13px; }
  .btn-ghost-ring:hover { box-shadow: inset 0 0 0 1.5px var(--warning-border); color: var(--warning-text); }
  .btn-navy-fill { height: 32px; padding: 0 16px; border: none; background: var(--navy); color: #fff; border-radius: 999px; font-weight: 600; font-size: 13px; }
  .btn-navy-fill:hover { background: var(--navy-hover); }
  .btn-navy-fill:disabled { background: var(--hairline); color: var(--disabled-fg); cursor: not-allowed; }
  .kebab-btn { width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; border: none; background: transparent; border-radius: 8px; color: var(--text-secondary); }
  .kebab-btn:hover { background: rgba(12,13,14,0.06); }
  .kebab-menu { position: absolute; top: 48px; right: 14px; z-index: 40; min-width: 190px; background: #fff; border: 1px solid var(--hairline); border-radius: 10px; box-shadow: var(--shadow-dropdown); padding: 6px; animation: pop 0.12s ease-out; }
  .kebab-item { width: 100%; display: flex; align-items: center; gap: 11px; padding: 9px 11px; border: none; background: transparent; border-radius: 7px; font-size: 13.5px; color: var(--text-primary); text-align: left; }
  .kebab-item:hover { background: var(--surface); }
  .kebab-item.danger { color: var(--danger-text); }
  .kebab-item.danger:hover { background: var(--danger-bg); }
  .kebab-divider { height: 1px; background: var(--hairline); margin: 5px 3px; }
  .menu-overlay { position: fixed; inset: 0; z-index: 30; }
  .empty-state { padding: 56px 24px; text-align: center; color: var(--text-tertiary); }
  .footnote { font-size: 12px; color: var(--text-tertiary); margin-top: 16px; line-height: 1.6; max-width: 760px; }

  .activity-card { margin-top: 20px; }
  .activity-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 18px; cursor: pointer; }
  .activity-head-title { display: flex; align-items: center; gap: 9px; font-weight: 600; font-size: 14px; }
  .activity-filter-note { font-weight: 400; color: var(--text-tertiary); }
  .activity-filter-note code.cron-chip { margin: 0 2px; }
  .activity-body td { font-size: 13px; }
  .activity-reason { color: var(--text-tertiary); max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pill-neutral { background: var(--surface); color: var(--text-secondary); }
  .pill-info { background: var(--info-bg); color: var(--info-text); }
  input.cron-input { width: 100%; height: 42px; padding: 0 13px; border: 1px solid var(--hairline); border-radius: 8px; font-family: var(--mono); font-size: 14px; color: var(--text-primary); outline: none; }
  input.cron-input:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(0,42,97,0.12); }
  #status { color: var(--text-tertiary); font-size: 13px; margin-bottom: 12px; }
  #load-error { color: var(--danger-text); font-size: 13px; margin-bottom: 12px; }

  .scrim { position: fixed; inset: 0; z-index: 50; background: rgba(12,13,14,0.28); animation: fade 0.18s ease-out; }
  .drawer { position: fixed; top: 0; right: 0; bottom: 0; z-index: 51; width: min(560px, 100vw); background: #fff; box-shadow: var(--shadow-dialog); display: flex; flex-direction: column; animation: drwr 0.22s ease-out; }
  .drawer-head { padding: 22px 26px 0; }
  .drawer-title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
  .drawer-title { font-weight: 300; font-size: 22px; letter-spacing: -0.02em; margin: 0; }
  .drawer-method { font-family: var(--mono); font-size: 12px; color: var(--text-tertiary); margin-top: 6px; }
  .drawer-close { width: 36px; height: 36px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; border: none; background: var(--surface); border-radius: 999px; color: var(--text-secondary); }
  .drawer-close:hover { background: var(--hairline); }
  .tabs { display: flex; gap: 4px; margin-top: 20px; border-bottom: 1px solid var(--hairline); }
  .tab-btn { padding: 10px 14px; border: none; background: transparent; border-bottom: 2px solid transparent; color: var(--text-tertiary); font-weight: 600; font-size: 13.5px; margin-bottom: -1px; display: flex; align-items: center; gap: 6px; }
  .tab-btn.active { border-bottom-color: var(--navy); color: var(--navy); }
  .tab-btn.disabled { cursor: default; }
  .tab-soon { font-size: 9px; font-weight: 600; padding: 1px 6px; border-radius: 999px; background: var(--surface); color: var(--text-tertiary); }
  .drawer-body { flex: 1; overflow-y: auto; padding: 22px 26px 32px; }
  .callout-warning { display: flex; gap: 12px; background: var(--warning-bg); border: 1px solid var(--warning-border); border-radius: 10px; padding: 13px 15px; margin-bottom: 20px; }
  .callout-warning .title { font-weight: 600; color: var(--warning-text); font-size: 13px; }
  .callout-warning .body { color: var(--text-secondary); margin-top: 3px; font-size: 13px; }
  dl.def-list { margin: 0; display: grid; grid-template-columns: 132px 1fr; }
  dl.def-list > div { grid-column: 1 / -1; display: grid; grid-template-columns: subgrid; padding: 11px 0; border-bottom: 1px solid var(--surface); }
  dl.def-list > div:last-child { border-bottom: none; }
  dl.def-list dt { font-size: 13px; color: var(--text-tertiary); }
  dl.def-list dd { margin: 0; font-size: 13.5px; word-break: break-word; }
  .drawer-action-row { display: flex; gap: 10px; margin-top: 22px; }
  .drawer-section-title { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 13.5px; color: var(--text-secondary); margin: 26px 0 12px; }
  .drawer-history-table { border: 1px solid var(--hairline); border-radius: 10px; overflow: hidden; }
  .drawer-history-table th, .drawer-history-table td { padding: 9px 10px; }
  .drawer-history-table .activity-reason { max-width: 90px; }

  .modal-scrim { position: fixed; inset: 0; z-index: 60; background: rgba(12,13,14,0.32); display: flex; align-items: center; justify-content: center; padding: 24px; animation: fade 0.15s ease-out; }
  .modal-box { width: min(460px, 100%); background: #fff; border-radius: 16px; box-shadow: var(--shadow-dialog); padding: 26px; animation: pop 0.16s ease-out; }
  .modal-head { display: flex; gap: 14px; align-items: flex-start; }
  .modal-icon { width: 42px; height: 42px; border-radius: 999px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .modal-title { font-weight: 300; font-size: 21px; letter-spacing: -0.02em; margin: 0; }
  .modal-body-text { font-size: 13.5px; color: var(--text-secondary); line-height: 1.55; margin: 8px 0 0; }
  .modal-body-text b { color: var(--text-primary); }
  .reason-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
  textarea.reason-input { width: 100%; padding: 11px 13px; border: 1px solid var(--hairline); border-radius: 8px; font: inherit; font-size: 14px; color: var(--text-primary); outline: none; resize: vertical; line-height: 1.5; }
  textarea.reason-input:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(0,42,97,0.12); }
  .modal-error { color: var(--danger-text); font-size: 12.5px; margin-top: 10px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
  .btn-text { height: 42px; padding: 0 20px; border: none; background: transparent; color: var(--text-secondary); border-radius: 999px; font-weight: 600; font-size: 14px; }
  .btn-text:hover { background: var(--surface); }
  .btn-warning-fill { height: 42px; padding: 0 22px; border: none; background: var(--warning-text); color: #fff; border-radius: 999px; font-weight: 600; font-size: 14px; }
  .btn-warning-fill:hover { background: #4a2d01; }
  .btn-warning-fill:disabled { background: var(--hairline); color: var(--disabled-fg); cursor: not-allowed; }
  .btn-danger-fill { height: 42px; padding: 0 22px; border: none; background: var(--danger-text); color: #fff; border-radius: 999px; font-weight: 600; font-size: 14px; }
  .btn-danger-fill:hover { background: #7a0101; }

  .toast { position: fixed; bottom: 24px; left: 50%; z-index: 70; display: flex; align-items: center; gap: 11px; background: #0c0d0e; color: #fff; padding: 13px 20px; border-radius: 999px; box-shadow: var(--shadow-dialog); font-size: 13.5px; font-weight: 500; animation: toastin 0.2s ease-out; max-width: 90vw; }

  @keyframes shimmer { from { background-position: 100% 0; } to { background-position: -100% 0; } }
  .skel { display: block; height: 12px; border-radius: 6px; background: linear-gradient(90deg, var(--surface) 25%, #e6e8eb 37%, var(--surface) 63%); background-size: 200% 100%; animation: shimmer 1.3s linear infinite; }
  button:focus-visible, a:focus-visible, input:focus-visible, textarea:focus-visible { outline: 2px solid rgba(0,42,97,0.5); outline-offset: 2px; }
  .search-box:focus-within { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(0,42,97,0.12); }
  .search-clear { width: 22px; height: 22px; padding: 0; border: none; background: var(--surface); border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; color: var(--text-tertiary); }
  .search-clear:hover { background: var(--hairline); color: var(--text-primary); }
  .kbd-hint { font-size: 11px; font-weight: 600; color: var(--text-tertiary); border: 1px solid var(--hairline); border-radius: 5px; padding: 1px 7px; }
  /* Re-renders recreate the scrim/drawer/modal DOM — .settled stops their entrance animations
     replaying on every render after the first (the source of the drawer-open flicker). */
  .scrim.settled, .drawer.settled, .modal-scrim.settled, .modal-scrim.settled .modal-box { animation: none; }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--text-primary); }
  th.sortable svg { vertical-align: -3px; margin-left: 2px; }
  .toast-undo { border: none; background: transparent; color: #9db9ff; font-weight: 600; font-size: 13px; padding: 0 2px; }
  .toast-undo:hover { text-decoration: underline; }
  @media (max-width: 920px) {
    .table-card { overflow-x: auto; }
    .table-card table { min-width: 880px; }
    main { padding: 24px 16px 96px; }
  }
</style>
</head>

  </nav>
</header>
<main><div id="app"></div></main>

      case "last": return ts(a.lastExecution, 0) - ts(b.lastExecution, 0);               // never-run sorts oldest
      case "status": return (isDisabled(a) ? 1 : 0) - (isDisabled(b) ? 1 : 0);
      default: return 0;
    }
  }

  // Shared by the Schedule/Parameters tabs — the row projects as a unit, so a dormant override
  // means the code defaults (schedule and parameter values) run regardless of which part broke.
  function renderDormantCallout(job) {
    if (!overrideInvalidated(job)) return '';
    var stored = job.override.cron
      ? 'The stored expression <code class="cron-chip">' + escapeHtml(job.override.cron) + '</code>'
      : 'The stored override';
    return '<div class="callout-warning">' + icon("error", 20) + '<div>' +
      '<div class="title">Stored override is dormant (' + escapeHtml(job.override.invalidatedReason || "invalidated") + ')</div>' +
      '<div class="body">' + stored + ' no longer applies, so the code defaults are running — schedule and parameter values both. Apply a new override or reset to clear it.</div></div></div>';
  }

  // ---------- parameter form (shared by the Parameters and Invoke tabs) ----------
  // What input a parameter renders as, from its schema type. Unrecognized types (arrays, option
  // objects) edit as raw JSON — the server binds them with System.Text.Json, so JSON is the honest
  // input format.
  function paramInputKind(parameter) {
    if (!parameter.editable) return "readonly";
    if (parameter.enumValues) return "enum";
    var t = parameter.type.replace(/\?$/, "");
    if (["int", "long", "short", "byte", "sbyte", "uint", "ulong", "ushort", "double", "float", "decimal"].indexOf(t) !== -1) return "number";
    if (t === "bool") return "bool";
    if (["string", "char", "Guid", "DateTime", "DateTimeOffset", "TimeSpan"].indexOf(t) !== -1) return "text";
    return "json";
  }
  // JSON value -> input draft string. Strings edit raw (no quotes); everything else edits as its
  // JSON text.
  function paramValueToDraft(parameter, value) {
    if (value === null || value === undefined) return "";
    if (typeof value === "string") return value;
    return JSON.stringify(value);
  }
  function paramDisplay(parameter, value) {
    if (value === null || value === undefined) return "—";
    return typeof value === "string" ? value : JSON.stringify(value);
  }
  // Pre-fill only stored override values; a blank field is "no value submitted" (the code default on
  // the Parameters tab; the effective value on Invoke, where the server overlays stored args itself).
  // Pre-filling effective values instead would pin every code default into the override on submit.
  function initDrafts(view) {
    var drafts = {};
    view.parameters.forEach(function (parameter) {
      if (parameter.editable) drafts[parameter.name] = paramValueToDraft(parameter, parameter.overrideValue);
    });
    return drafts;
  }
  // Drafts -> the args object to submit. A blank input means "code default" and is omitted (the
  // server's per-parameter fallback). Returns { args, count, errors }.
  function collectArgs(view, drafts) {
    var args = {}, count = 0, errors = [];
    view.parameters.forEach(function (parameter) {
      if (!parameter.editable) return;
      var draft = drafts[parameter.name];
      if (draft === undefined || String(draft).trim() === "") return;
      var trimmed = String(draft).trim();
      var kind = paramInputKind(parameter);
      var value;
      if (kind === "number") {
        value = Number(trimmed);
        if (!isFinite(value)) { errors.push("parameter '" + parameter.name + "': not a number"); return; }
      } else if (kind === "bool") {
        value = trimmed === "true";
      } else if (kind === "json") {
        try { value = JSON.parse(trimmed); }
        catch (e) { errors.push("parameter '" + parameter.name + "': not valid JSON"); return; }
      } else {
        value = trimmed;
      }
      args[parameter.name] = value;
      count++;
    });
    return { args: args, count: count, errors: errors };
  }
  function renderParamFields(view, drafts, draftAction) {
    var html = '';
    view.parameters.forEach(function (parameter) {
      var kind = paramInputKind(parameter);
      var name = escapeAttr(parameter.name);
      var inputId = draftAction + "-" + parameter.name;
      html += '<div>';
      html += '<div class="reason-label">' + escapeHtml(parameter.name) +
        ' <span style="font-family:var(--mono);font-weight:400;color:var(--text-tertiary)">' + escapeHtml(parameter.type) + '</span></div>';
      if (kind === "readonly") {
        html += '<div class="cron-human" style="margin-top:0">Provided by the server at run time — not operator-editable.</div>';
      } else {
        var draft = drafts[parameter.name] === undefined ? "" : drafts[parameter.name];
        if (kind === "enum" || kind === "bool") {
          var options = kind === "bool" ? ["true", "false"] : parameter.enumValues;
          html += '<select id="' + escapeAttr(inputId) + '" class="cron-input" style="font-family:inherit" data-action="' + draftAction + '" data-param="' + name + '">';
          html += '<option value=""' + (draft === "" ? ' selected' : '') + '>(code default)</option>';
          options.forEach(function (option) {
            html += '<option value="' + escapeAttr(option) + '"' + (draft === option ? ' selected' : '') + '>' + escapeHtml(option) + '</option>';
          });
          html += '</select>';
        } else {
          html += '<input id="' + escapeAttr(inputId) + '" class="cron-input"' + (kind === "number" || kind === "json" ? '' : ' style="font-family:inherit"') +
            ' data-action="' + draftAction + '" data-param="' + name + '" value="' + escapeAttr(draft) + '" placeholder="(code default)" spellcheck="false">';
        }
        html += '<div class="cron-human">code default: ' + escapeHtml(paramDisplay(parameter, parameter.codeDefault)) +
          (parameter.overrideValue !== null && parameter.overrideValue !== undefined ? ' · stored override: ' + escapeHtml(paramDisplay(parameter, parameter.overrideValue)) : '') + '</div>';
      }
      html += '</div>';
    });
    return html;
  }
  function renderParamsLoadState(job) {
    var p = state.params;
    if (p.loadError) return '<div style="color:var(--danger-text);font-size:13px">' + escapeHtml(p.loadError) + '</div>';
    if (p.loading || p.jobId !== job.id || !p.view) return '<div style="color:var(--text-tertiary);font-size:13px">Loading parameters…</div>';
    return null;
  }

  function renderParametersTab(job) {
    var id = escapeAttr(job.id);
    var html = renderDormantCallout(job);
    var loadState = renderParamsLoadState(job);
    if (loadState !== null) return html + loadState;
    var view = state.params.view;

    if (view.parameters.filter(function (parameter) { return parameter.editable; }).length === 0) {
      html += '<div class="empty-state" style="padding:36px 12px">This job\'s method takes no parameters — there is nothing to override.</div>';
      return html;
    }

    var reasonValid = state.paramReasonDraft.trim().length > 0;
    var collected = collectArgs(view, state.paramDrafts);
    html += '<div class="drawer-section-title" style="margin-top:4px">' + icon("history", 15) + (hasActiveArgsOverride(job) ? 'Change parameter override' : 'Set parameter override') + '</div>';
    html += '<div style="display:grid;gap:14px">';
    html += renderParamFields(view, state.paramDrafts, "param-draft");
    html += '<div><div class="reason-label">Reason <span style="color:var(--danger-text)">*</span></div>' +
      '<textarea id="param-reason-input" class="reason-input" data-action="param-reason-input" rows="2" placeholder="e.g. Smaller batches while the provider backlog drains">' + escapeHtml(state.paramReasonDraft) + '</textarea></div>';
    if (state.paramsError) html += '<div class="modal-error" style="margin-top:0">' + escapeHtml(state.paramsError) + '</div>';
    html += '<div style="display:flex;gap:10px">' +
      '<button class="btn-navy-fill" style="height:40px;padding:0 20px" data-action="apply-args" data-id="' + id + '"' + (collected.count === 0 || !reasonValid || state.paramsBusy ? ' disabled' : '') + '>Apply override</button>' +
      (job.override && job.override.argsJson ? '<button class="btn-ghost-ring" style="height:40px" data-action="reset-args" data-id="' + id + '"' + (state.paramsBusy ? ' disabled' : '') + '>Reset to code defaults</button>' : '') +
      '</div>';
    html += '</div>';
    html += '<p class="footnote" style="margin-top:20px">Values are validated against the method signature, applied through Hangfire, then stored durably — scheduled fires use them and deploys re-assert them until reset. A blank field means the code default; if the method\'s signature changes the override goes dormant (kept, not deleted).</p>';
    return html;
  }

  function renderInvokeTab(job) {
    var id = escapeAttr(job.id);
    var html = '';
    if (isDisabled(job)) {
      html += '<div class="callout-warning">' + icon("pauseCircle", 20) + '<div>' +
        '<div class="title">This job is disabled — an invoke runs anyway</div>' +
        '<div class="body">Invoke creates a one-off run that bypasses the disable skip (the intended force-run). Scheduled fires stay skipped.</div></div></div>';
    }
    var loadState = renderParamsLoadState(job);
    if (loadState !== null) return html + loadState;
    var view = state.params.view;

    var editable = view.parameters.filter(function (parameter) { return parameter.editable; });
    var collected = collectArgs(view, state.invokeDrafts);
    var reasonNeeded = state.invokePersist;
    var reasonValid = !reasonNeeded || state.invokeReasonDraft.trim().length > 0;

    html += '<div class="drawer-section-title" style="margin-top:4px">' + icon("bolt", 15) + 'Run now with these values</div>';
    html += '<div style="display:grid;gap:14px">';
    if (editable.length === 0) {
      html += '<div style="color:var(--text-tertiary);font-size:13px">This job\'s method takes no parameters — the run uses the method as-is.</div>';
    } else {
      html += renderParamFields(view, state.invokeDrafts, "invoke-draft");
    }
    if (editable.length > 0) {
      html += '<label style="display:flex;align-items:flex-start;gap:9px;font-size:13px;color:var(--text-secondary);cursor:pointer">' +
        '<input type="checkbox" data-action="invoke-persist" style="margin-top:2px"' + (state.invokePersist ? ' checked' : '') + '>' +
        '<span><b>Also store these values as the parameter override</b><br><span style="color:var(--text-tertiary)">Scheduled fires adopt them until reset. Off: this run only.</span></span></label>';
      if (reasonNeeded) {
        html += '<div><div class="reason-label">Reason <span style="color:var(--danger-text)">*</span></div>' +
          '<textarea id="invoke-reason-input" class="reason-input" data-action="invoke-reason-input" rows="2" placeholder="Why the stored values are changing">' + escapeHtml(state.invokeReasonDraft) + '</textarea></div>';
      }
    }
    if (state.invokeError) html += '<div class="modal-error" style="margin-top:0">' + escapeHtml(state.invokeError) + '</div>';
    html += '<div style="display:flex;gap:10px">' +
      '<button class="btn-navy-fill" style="height:40px;padding:0 20px" data-action="do-invoke" data-id="' + id + '"' + (!reasonValid || state.invokeBusy ? ' disabled' : '') + '>' + icon("bolt", 16) + ' Run now</button>' +
      '</div>';
    html += '</div>';
    html += '<p class="footnote" style="margin-top:20px">Unlike "Trigger now" (which is skipped for a disabled job), invoke creates an ad-hoc run and always executes. A blank field uses the job\'s effective value (stored override, else code default). Every invoke is audited with the values used.</p>';
    return html;
  }

  function renderModal() {
    var job = getJob(state.modalJobId);
    var id = escapeHtml(state.modalJobId || "");
    var settledCls = state.modalSettled ? " settled" : "";
    state.modalSettled = true;
    var html = '<div class="modal-scrim' + settledCls + '"><div class="modal-box">';
    if (state.modal === "disable") {
      var reasonValid = state.reasonDraft.trim().length > 0;
      html += '<div class="modal-head"><div class="modal-icon" style="background:var(--warning-bg)">' + icon("pause", 22) + '</div>' +
        '<div><h3 class="modal-title">Disable ' + id + '</h3>' +
        '<p class="modal-body-text">The job stays scheduled but every fire is skipped until re-enabled. <b>Skipped runs are not backfilled.</b></p></div></div>';
      html += '<div style="margin-top:18px"><div class="reason-label">Reason <span style="color:var(--danger-text)">*</span></div>' +
        '<textarea id="disable-reason-input" class="reason-input" data-action="reason-input" rows="3" placeholder="e.g. Paused during payment-provider incident INC-1042">' + escapeHtml(state.reasonDraft) + '</textarea></div>';
      if (state.modalError) html += '<div class="modal-error">' + escapeHtml(state.modalError) + '</div>';
      html += '<div class="modal-footer"><button class="btn-text" data-action="close-modal">Cancel</button>' +
        '<button class="btn-warning-fill" data-action="confirm-disable"' + (!reasonValid || state.modalBusy ? " disabled" : "") + '>Disable job</button></div>';
    } else if (state.modal === "delete") {
      html += '<div class="modal-head"><div class="modal-icon" style="background:var(--danger-bg)">' + icon("delete", 22) + '</div>' +
        '<div><h3 class="modal-title">Delete ' + id + '</h3>' +
        '<p class="modal-body-text">Removes the recurring job from storage. This <b>does not stop it firing again</b> — code re-registers it on the next deploy. To keep it off durably, disable it instead.</p></div></div>';
      if (state.modalError) html += '<div class="modal-error">' + escapeHtml(state.modalError) + '</div>';
      html += '<div class="modal-footer"><button class="btn-text" data-action="close-modal">Cancel</button>' +
        '<button class="btn-danger-fill" data-action="confirm-delete"' + (state.modalBusy ? " disabled" : "") + '>Delete anyway</button></div>';
    }
    html += '</div></div>';
    return html;
  }

  function renderToast() {
    return '<div class="toast">' + icon(state.toast.icon, 18) + escapeHtml(state.toast.message) +
      (state.toast.undo ? '<button class="toast-undo" data-action="toast-undo">Undo</button>' : '') + '</div>';
  }

  // ---------- data loading ----------
  function loadJobs() {
    state.loading = state.jobs.length === 0;
    state.loadError = null;
    render();
    fetch(API_BASE, { credentials: "same-origin" })
      .then(function (res) {
        if (!res.ok) throw new Error("Failed to load jobs (HTTP " + res.status + ")");
        return res.json();
      })
      .then(normalizeKeys)
      .then(function (jobs) {
        state.jobs = jobs;
        state.loading = false;
        render();
      })
      .catch(function (err) {
        state.loading = false;
        state.loadError = err.message;
        render();
      });
  }

  function loadActivity() {
    var a = state.activity;
    a.loading = a.entries.length === 0;
    a.loadError = null;
    render();
    var url = API_BASE + "/audit?limit=100" + (a.jobFilter ? "&jobId=" + encodeURIComponent(a.jobFilter) : "");
    fetch(url, { credentials: "same-origin" })
      .then(function (res) {
        if (!res.ok) throw new Error("Failed to load activity (HTTP " + res.status + ")");
        return res.json();
      })
      .then(normalizeKeys)
      .then(function (entries) {
        a.entries = entries;
        a.loading = false;
        render();
      })
      .catch(function (err) {
        a.loading = false;
        a.loadError = err.message;
        render();
      });
  }

  function loadJobHistory(jobId) {
    var h = state.drawerHistory;
    h.jobId = jobId;
    h.loading = true;
    h.loadError = null;
    render();
    fetch(API_BASE + "/audit?limit=50&jobId=" + encodeURIComponent(jobId), { credentials: "same-origin" })
      .then(function (res) {
        if (!res.ok) throw new Error("Failed to load history (HTTP " + res.status + ")");
        return res.json();
      })
      .then(normalizeKeys)
      .then(function (entries) {
        if (state.drawerHistory.jobId !== jobId) return; // drawer moved to a different job (or closed) meanwhile
        h.entries = entries;
        h.loading = false;
        render();
      })
      .catch(function (err) {
        if (state.drawerHistory.jobId !== jobId) return;
        h.loading = false;
        h.loadError = err.message;
        render();
      });
  }

  function loadParams(jobId) {
    var p = state.params;
    p.jobId = jobId;
    p.loading = true;
    p.loadError = null;
    p.view = null;
    render();
    fetch(API_BASE + "/" + encodeURIComponent(jobId) + "/parameters", { credentials: "same-origin" })
      .then(function (res) {
        if (!res.ok) throw new Error("Failed to load parameters (HTTP " + res.status + ")");
        return res.json();
      })
      .then(normalizeKeys)
      .then(function (view) {
        if (state.params.jobId !== jobId) return; // drawer moved to a different job (or closed) meanwhile
        p.view = view;
        p.loading = false;
        state.paramDrafts = initDrafts(view);
        state.invokeDrafts = initDrafts(view);
        render();
      })
      .catch(function (err) {
        if (state.params.jobId !== jobId) return;
        p.loading = false;
        p.loadError = err.message;
        render();
      });
  }

  function apiPost(jobId, action, body) {
    return fetch(API_BASE + "/" + encodeURIComponent(jobId) + "/" + action, {
      method: "POST",
      credentials: "same-origin",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body || {}),
    }).then(function (res) {
      if (!res.ok) return res.text().then(function (t) { throw new Error(t || ("Request failed with HTTP " + res.status)); });
    });
  }

  function showToast(message, iconName, undoFn) {
    state.toast = { message: message, icon: iconName || "checkCircle", undo: undoFn || null };
    render();
    clearTimeout(toastTimer);
    // Undo toasts linger longer — 2.8s is too tight to read, decide, and click.
    toastTimer = setTimeout(function () { state.toast = null; render(); }, undoFn ? 6000 : TOAST_MS);
  }

  // ---------- actions ----------
  function doEnable(jobId) {
    // Captured before the call so Undo can restore the disable with its original reason.
    var prev = getJob(jobId);
    var prevReason = prev && prev.disableStatus && prev.disableStatus.reason;
    apiPost(jobId, "enable", {})
      .then(function () {
        loadJobs(); loadActivity();
        showToast("Enabled '" + jobId + "'", "playArrow", prevReason ? function () {
          apiPost(jobId, "disable", { reason: prevReason })
            .then(function () { loadJobs(); loadActivity(); showToast("Disabled '" + jobId + "' again", "pauseCircle"); })
            .catch(function (err) { showToast("Failed to disable '" + jobId + "': " + err.message, "error"); });
        } : null);
      })
      .catch(function (err) { showToast("Failed to enable '" + jobId + "': " + err.message, "error"); });
  }
  function doTrigger(jobId) {
    var job = getJob(jobId);
    var wasDisabled = job && isDisabled(job);
    apiPost(jobId, "trigger", {})
      .then(function () { loadActivity(); showToast(wasDisabled ? "'" + jobId + "' is disabled — trigger was skipped" : "Enqueued '" + jobId + "'", wasDisabled ? "block" : "bolt"); })
      .catch(function (err) { showToast("Failed to trigger '" + jobId + "': " + err.message, "error"); });
  }
  function confirmDisable() {
    var jobId = state.modalJobId, reason = state.reasonDraft.trim();
    if (!reason) return;
    state.modalBusy = true; state.modalError = null; render();
    apiPost(jobId, "disable", { reason: reason })
      .then(function () {
        state.modal = null; state.modalJobId = null; state.modalBusy = false;
        loadJobs();
        loadActivity();
        showToast("Disabled '" + jobId + "'", "pauseCircle", function () { doEnable(jobId); });
      })
      .catch(function (err) { state.modalBusy = false; state.modalError = err.message; render(); });
  }
  function confirmDelete() {
    var jobId = state.modalJobId;
    state.modalBusy = true; state.modalError = null; render();
    apiPost(jobId, "delete", {})
      .then(function () {
        state.modal = null; state.modalJobId = null; state.modalBusy = false;
        if (state.detailId === jobId) state.detailId = null;
        loadJobs();
        loadActivity();
        showToast("Deleted '" + jobId + "' (will return on next deploy)", "delete");
      })
      .catch(function (err) { state.modalBusy = false; state.modalError = err.message; render(); });
  }

  function applyCron(jobId) {
    var cron = state.cronDraft.trim(), reason = state.cronReasonDraft.trim();
    if (!cron || !reason) return;
    state.scheduleBusy = true; state.scheduleError = null; render();
    apiPost(jobId, "cron", { cron: cron, reason: reason })
      .then(function () {
        state.scheduleBusy = false; state.cronDraft = ""; state.cronReasonDraft = "";
        loadJobs(); loadActivity(); loadJobHistory(jobId);
        showToast("Schedule override applied to '" + jobId + "'", "checkCircle");
      })
      .catch(function (err) { state.scheduleBusy = false; state.scheduleError = err.message; render(); });
  }
  function resetCron(jobId) {
    state.scheduleBusy = true; state.scheduleError = null; render();
    apiPost(jobId, "cron/reset", {})
      .then(function () {
        state.scheduleBusy = false;
        loadJobs(); loadActivity(); loadJobHistory(jobId);
        showToast("'" + jobId + "' is back on its code-default schedule", "checkCircle");
      })
      .catch(function (err) { state.scheduleBusy = false; state.scheduleError = err.message; render(); });
  }
  function applyArgs(jobId) {
    var collected = collectArgs(state.params.view, state.paramDrafts);
    if (collected.errors.length) { state.paramsError = collected.errors.join("; "); render(); return; }
    var reason = state.paramReasonDraft.trim();
    if (collected.count === 0 || !reason) return;
    state.paramsBusy = true; state.paramsError = null; render();
    apiPost(jobId, "args", { args: collected.args, reason: reason })
      .then(function () {
        state.paramsBusy = false; state.paramReasonDraft = "";
        loadJobs(); loadActivity(); loadJobHistory(jobId); loadParams(jobId);
        showToast("Parameter override applied to '" + jobId + "'", "checkCircle");
      })
      .catch(function (err) { state.paramsBusy = false; state.paramsError = err.message; render(); });
  }
  function resetArgs(jobId) {
    state.paramsBusy = true; state.paramsError = null; render();
    apiPost(jobId, "args/reset", {})
      .then(function () {
        state.paramsBusy = false;
        loadJobs(); loadActivity(); loadJobHistory(jobId); loadParams(jobId);
        showToast("'" + jobId + "' is back on its code-default parameters", "checkCircle");
      })
      .catch(function (err) { state.paramsBusy = false; state.paramsError = err.message; render(); });
  }
  function doInvoke(jobId) {
    var collected = collectArgs(state.params.view, state.invokeDrafts);
    if (collected.errors.length) { state.invokeError = collected.errors.join("; "); render(); return; }
    var persist = state.invokePersist;
    var reason = state.invokeReasonDraft.trim();
    if (persist && !reason) return;
    state.invokeBusy = true; state.invokeError = null; render();
    apiPost(jobId, "invoke", { args: collected.args, persist: persist, reason: reason || null })
      .then(function () {
        state.invokeBusy = false;
        loadActivity(); loadJobHistory(jobId);
        if (persist) {
          state.invokeReasonDraft = ""; state.invokePersist = false;
          loadJobs(); loadParams(jobId);
        } else {
          render();
        }
        showToast(persist ? "Invoked '" + jobId + "' and stored the values" : "Invoked '" + jobId + "'", "bolt");
      })
      .catch(function (err) { state.invokeBusy = false; state.invokeError = err.message; render(); });
  }
  function doReconcile() {
    fetch(API_BASE + "/reconcile", { method: "POST", credentials: "same-origin", headers: { "Content-Type": "application/json" } })
      .then(function (res) {
        if (!res.ok) return res.text().then(function (t) { throw new Error(t || ("Request failed with HTTP " + res.status)); });
        return res.json();
      })
      .then(normalizeKeys)
      .then(function (summary) {
        loadJobs(); loadActivity();
        var bits = [summary.projected + " projected"];
        if (summary.overriddenJobIds.length) bits.push(summary.overriddenJobIds.length + " overridden");
        if (summary.invalidatedJobIds.length) bits.push(summary.invalidatedJobIds.length + " invalidated");
        if (summary.revalidatedJobIds.length) bits.push(summary.revalidatedJobIds.length + " revalidated");
        if (summary.errors.length) bits.push(summary.errors.length + " errors");
        showToast("Reconciled — " + bits.join(", "), summary.errors.length ? "error" : "checkCircle");
      })
      .catch(function (err) { showToast("Reconcile failed: " + err.message, "error"); });
  }

  // ---------- event delegation ----------
  document.addEventListener("click", function (event) {
    // Background dismiss: only when the click lands directly on the scrim itself, not a bubbled
    // click from inside .modal-box (which is nested inside .modal-scrim for centering).
    if (event.target.classList && event.target.classList.contains("modal-scrim")) {
      state.modal = null; state.modalJobId = null; state.modalError = null; render(); return;
    }

    var target = event.target.closest("[data-action]");
    if (!target) return;
    var action = target.getAttribute("data-action");
    var id = target.getAttribute("data-id");

    // Row action buttons/kebab live inside a clickable <tr> — don't also open the drawer.
    if (target.closest("[data-stop-row-click]") && action !== "open-detail") event.stopPropagation();

    switch (action) {
    case "refresh": loadJobs(); loadActivity(); showToast("Reloaded from storage", "refresh"); break;
    case "filter": state.filter = target.getAttribute("data-filter"); syncUrl(); render(); break;
    case "clear-search": state.search = ""; render(); break;
    case "clear-view": state.search = ""; state.filter = "all"; syncUrl(); render(); break;
    case "expand-banner": state.bannerExpanded = true; render(); break;
    case "sort":
      var sortKey = target.getAttribute("data-key");
      if (state.sort && state.sort.key === sortKey) {
        if (state.sort.dir === 1) state.sort.dir = -1; else state.sort = null;
      } else {
        state.sort = { key: sortKey, dir: 1 };
      }
      render();
      break;
    case "toast-undo":
      var undoFn = state.toast && state.toast.undo;
      clearTimeout(toastTimer);
      state.toast = null;
      render();
      if (undoFn) undoFn();
      break;
    case "open-detail":
      state.detailId = id; state.openMenuId = null; state.drawerSettled = false; state.drawerTab = "overview";
      state.cronDraft = ""; state.cronReasonDraft = ""; state.scheduleError = null;
      state.params = { jobId: null, view: null, loading: false, loadError: null };
      state.paramDrafts = {}; state.paramReasonDraft = ""; state.paramsError = null;
      state.invokeDrafts = {}; state.invokePersist = false; state.invokeReasonDraft = ""; state.invokeError = null;
      loadJobHistory(id);
      break;
    case "drawer-tab":
      state.drawerTab = target.getAttribute("data-tab");
      state.scheduleError = null; state.paramsError = null; state.invokeError = null;
      // The two parameter-driven tabs share one schema fetch, done lazily on first entry.
      if ((state.drawerTab === "parameters" || state.drawerTab === "invoke") && state.params.jobId !== state.detailId) {
        loadParams(state.detailId);
      } else {
        render();
      }
      break;
    case "apply-cron": applyCron(id); break;
    case "reset-cron": resetCron(id); break;
    case "apply-args": applyArgs(id); break;
    case "reset-args": resetArgs(id); break;
    case "do-invoke": doInvoke(id); break;
    case "invoke-persist": state.invokePersist = target.checked; render(); break;
    case "reconcile": doReconcile(); break;
    case "close-detail": state.detailId = null; render(); break;
    case "toggle-menu": event.stopPropagation(); state.openMenuId = state.openMenuId === id ? null : id; render(); break;
    case "close-menu": state.openMenuId = null; render(); break;
    case "disable":
      state.modal = "disable"; state.modalJobId = id; state.reasonDraft = ""; state.modalError = null; state.openMenuId = null; state.modalSettled = false; render();
      var reasonEl = document.getElementById("disable-reason-input");
      if (reasonEl) reasonEl.focus();
      break;
    case "ask-delete": state.modal = "delete"; state.modalJobId = id; state.modalError = null; state.openMenuId = null; state.modalSettled = false; render(); break;
    case "enable": doEnable(id); break;
    case "trigger": doTrigger(id); state.openMenuId = null; render(); break;
    case "close-modal": state.modal = null; state.modalJobId = null; state.modalError = null; render(); break;
    case "confirm-disable": confirmDisable(); break;
    case "confirm-delete": confirmDelete(); break;
    case "toggle-activity": state.activity.collapsed = !state.activity.collapsed; render(); break;
    case "clear-activity-filter": state.activity.jobFilter = null; loadActivity(); break;
    case "history":
      state.openMenuId = null;
      state.activity.jobFilter = id;
      state.activity.collapsed = false;
      loadActivity();
      setTimeout(function () {
        var panel = document.getElementById("activity-panel");
        if (panel) panel.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 30);
      break;
    }
  });

  document.addEventListener("input", function (event) {
    if (event.target.getAttribute("data-action") === "search") { state.search = event.target.value; render(); }
    else if (event.target.getAttribute("data-action") === "reason-input") {
      // A full render() here would tear down and recreate .modal-scrim/.modal-box, replaying their
      // CSS entrance animations (fade/pop) on every keystroke — the visible flicker. The only thing
      // that actually needs to change per keystroke is the confirm button's disabled state.
      state.reasonDraft = event.target.value;
      var confirmBtn = document.querySelector('[data-action="confirm-disable"]');
      if (confirmBtn) confirmBtn.disabled = state.reasonDraft.trim().length === 0 || state.modalBusy;
    }
    // Same no-full-render rule as reason-input: per keystroke only the apply button's disabled state
    // and the human-readable cron preview change.
    else if (event.target.getAttribute("data-action") === "cron-input" || event.target.getAttribute("data-action") === "cron-reason-input") {
      if (event.target.getAttribute("data-action") === "cron-input") {
        state.cronDraft = event.target.value;
        var preview = document.getElementById("cron-preview");
        if (preview) preview.innerHTML = state.cronDraft.trim() ? escapeHtml(describeCron(state.cronDraft)) : "&nbsp;";
      } else {
        state.cronReasonDraft = event.target.value;
      }
      var applyBtn = document.querySelector('[data-action="apply-cron"]');
      if (applyBtn) {
        var cronOk = state.cronDraft.trim().split(/\s+/).length >= 5;
        applyBtn.disabled = !cronOk || state.cronReasonDraft.trim().length === 0 || state.scheduleBusy;
      }
    }
    // Parameter-form fields (inputs and selects) — same rule: update drafts and button state only.
    else if (event.target.getAttribute("data-action") === "param-draft" || event.target.getAttribute("data-action") === "param-reason-input") {
      if (event.target.getAttribute("data-action") === "param-draft") {
        state.paramDrafts[event.target.getAttribute("data-param")] = event.target.value;
      } else {
        state.paramReasonDraft = event.target.value;
      }
      var argsBtn = document.querySelector('[data-action="apply-args"]');
      if (argsBtn && state.params.view) {
        var collected = collectArgs(state.params.view, state.paramDrafts);
        argsBtn.disabled = collected.count === 0 || state.paramReasonDraft.trim().length === 0 || state.paramsBusy;
      }
    }
    else if (event.target.getAttribute("data-action") === "invoke-draft" || event.target.getAttribute("data-action") === "invoke-reason-input") {
      if (event.target.getAttribute("data-action") === "invoke-draft") {
        state.invokeDrafts[event.target.getAttribute("data-param")] = event.target.value;
      } else {
        state.invokeReasonDraft = event.target.value;
      }
      var invokeBtn = document.querySelector('[data-action="do-invoke"]');
      if (invokeBtn) {
        invokeBtn.disabled = (state.invokePersist && state.invokeReasonDraft.trim().length === 0) || state.invokeBusy;
      }
    }
  });

  document.addEventListener("keydown", function (event) {
    // "/" focuses search from anywhere outside a text field (mirrors the kbd hint in the box).
    if (event.key === "/" && !state.modal && !event.ctrlKey && !event.metaKey) {
      var tag = (document.activeElement && document.activeElement.tagName) || "";
      if (tag !== "INPUT" && tag !== "TEXTAREA" && tag !== "SELECT") {
        var searchEl = document.getElementById("search-input");
        if (searchEl) { event.preventDefault(); searchEl.focus(); searchEl.select(); }
      }
      return;
    }
    // Cmd/Ctrl+Enter submits the disable modal (plain Enter stays a newline in the reason textarea).
    if (event.key === "Enter" && (event.metaKey || event.ctrlKey) && state.modal === "disable") {
      if (state.reasonDraft.trim() && !state.modalBusy) confirmDisable();
      return;
    }
    if (event.key !== "Escape") return;
    if (state.modal) { state.modal = null; state.modalJobId = null; render(); }
    else if (state.openMenuId) { state.openMenuId = null; render(); }
    else if (state.detailId) { state.detailId = null; render(); }
  });

  // Relative timestamps ("in 9 min", "2 hr ago") drift — re-render once a minute so they stay honest.
  // Skipped while a modal or row menu is open: a full render would replay their entrance animations.
  setInterval(function () {
    if (!state.modal && !state.openMenuId) render();
  }, 60000);

  readUrlState();
  loadJobs();
  loadActivity();
})();
</script>
</body>
</html>
